<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans Gujarati',system-ui,-apple-system,'Segoe UI',sans-serif;
  background:#f0f4f8;color:#1a2535;line-height:1.4;
  font-display:swap
}
.container{max-width:1200px;margin:0 auto;padding:10px}
.header{background:linear-gradient(135deg,#0f2442,#1a3c5e);color:#fff;padding:12px;position:sticky;top:0;z-index:100;box-shadow:0 3px 10px rgba(0,0,0,.3)}
.header h1{font-size:18px;text-align:center;margin-bottom:8px}
.nav{display:flex;gap:4px;justify-content:center;flex-wrap:wrap}
.nav button{background:transparent;color:#cfd8e3;border:none;padding:8px 12px;font-size:13px;font-family:inherit;cursor:pointer;border-bottom:3px solid transparent;font-weight:600}
.nav button.active{color:#f39c12;border-bottom-color:#f39c12}
.card{background:#fff;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.08);margin-bottom:12px;border:1px solid #d1dce8;overflow:hidden}
.section-head{background:linear-gradient(135deg,#1a3c5e,#2563a8);color:#fff;padding:10px 14px;font-weight:700;font-size:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.section-body{padding:12px}

.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.inv-card{border:1px solid #d1dce8;border-radius:10px;padding:10px;background:#fafcff}
.inv-title{font-weight:700;font-size:13px;margin-bottom:6px;padding:4px 8px;border-radius:14px;display:inline-block}
.inv-row{display:flex;justify-content:space-between;align-items:center;margin:4px 0;font-size:12px}
.inv-row label{color:#475569;font-weight:600}
.inv-row input{width:75px;padding:4px 6px;border:1px solid #cbd5e1;border-radius:6px;font-family:inherit;text-align:right;font-size:12px}
.inv-stat{font-size:11px;color:#64748b;margin-top:6px;padding-top:6px;border-top:1px dashed #d1dce8}
.inv-stat b{color:#2563a8}
.cal-head{display:flex;justify-content:space-between;align-items:center;padding:8px;gap:6px}
.cal-head button{background:#2563a8;color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700}
.cal-head h3{font-size:15px;font-weight:700;color:#1a3c5e}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:4px;box-sizing:border-box;width:100%}
.cal-day-head{text-align:center;font-weight:700;font-size:11px;padding:5px 1px;background:#1a3c5e;color:#fff;border-radius:4px;box-sizing:border-box;overflow:hidden}
.cal-day-head.sun{background:#cc3d3d}
.cal-cell{aspect-ratio:1;border:1px solid #d1dce8;border-radius:6px;padding:2px;cursor:pointer;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;font-size:11px;transition:all .15s;min-height:44px;position:relative;box-sizing:border-box;overflow:hidden}
.cal-cell:hover{background:#e0f2fe;border-color:#2563a8}
.cal-cell.empty{background:transparent;border:none;cursor:default}
.cal-cell.today{background:#fef3c7;border-color:#f59e0b;border-width:2px}
.cal-cell .d{font-weight:700;font-size:12px;color:#1a3c5e}
.cal-cell.sunday .d{color:#cc3d3d}
.cal-cell .n{font-weight:800;font-size:14px;color:#1b8f57;margin-top:2px}
.cal-cell .n.zero{color:#cbd5e1;font-size:10px}
.cal-totals{display:flex;justify-content:space-around;background:#eef5fb;padding:8px;flex-wrap:wrap;gap:6px;border-top:1px solid #d1dce8}
.cal-totals div{font-size:12px;text-align:center}
.cal-totals b{color:#2563a8;display:block;font-size:14px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:500;padding:14px}
.modal{background:#fff;border-radius:14px;padding:18px;max-width:340px;width:100%;box-shadow:0 10px 30px rgba(0,0,0,.3)}
.modal h3{margin-bottom:10px;color:#1a3c5e;font-size:16px}
.modal p{font-size:13px;color:#475569;margin-bottom:10px}
.modal input{width:100%;padding:10px;border:2px solid #cbd5e1;border-radius:8px;font-family:inherit;font-size:18px;text-align:center;font-weight:700;margin-bottom:12px}
.modal input:focus{outline:none;border-color:#2563a8}
.modal-btns{display:flex;gap:8px}
.modal-btns button{flex:1;padding:10px;border:none;border-radius:8px;font-family:inherit;font-weight:700;cursor:pointer;font-size:14px}
.btn-save{background:#1b8f57;color:#fff}
.btn-cancel{background:#e2e8f0;color:#475569}
.btn-clear{background:#cc3d3d;color:#fff}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{border-collapse:separate;border-spacing:0;width:100%;font-size:11px}
th{background:#1a3c5e;color:#fff;padding:8px 6px;text-align:center;border:1px solid rgba(255,255,255,.15);font-weight:700;font-size:11px;white-space:nowrap;position:sticky;top:0;z-index:2}
td{padding:6px;text-align:center;border:1px solid #d1dce8;background:#fff;white-space:nowrap}
tr:nth-child(even) td{background:#f8fafc}

.sticky-c1{position:sticky;left:0;z-index:3;box-shadow:none;width:32px;min-width:32px;max-width:32px}
.sticky-c2{position:sticky;left:32px;z-index:3;white-space:nowrap;width:auto;padding-left:6px;padding-right:6px}
.sticky-c3{position:sticky;left:calc(32px + var(--c2w, 52px));z-index:3;width:32px;min-width:32px;max-width:32px;box-shadow:2px 0 4px rgba(0,0,0,.08)}
th.sticky-c1,th.sticky-c2,th.sticky-c3{z-index:5;background:#1a3c5e}
td.sticky-c1,td.sticky-c2,td.sticky-c3{background:#fff}
tr:nth-child(even) td.sticky-c1,tr:nth-child(even) td.sticky-c2,tr:nth-child(even) td.sticky-c3{background:#f8fafc}
tr.sun-row td{background:#fff0f0 !important;color:#991b1b}
tr.sun-row td.sticky-c1,tr.sun-row td.sticky-c2,tr.sun-row td.sticky-c3{background:#fff0f0 !important;color:#991b1b;font-weight:700}
.total-row td{background:#fef3c7 !important;font-weight:800;color:#92400e;border-top:2px solid #f59e0b}
.total-row td.sticky-c1,.total-row td.sticky-c2,.total-row td.sticky-c3{background:#fef3c7 !important;color:#92400e}
.report-tabs{display:flex;gap:6px;padding:8px;background:#eef5fb;border-bottom:1px solid #d1dce8}
.report-tabs button{flex:1;padding:8px;border:none;background:#fff;color:#475569;border-radius:6px;font-family:inherit;font-weight:700;cursor:pointer;font-size:13px;border:1px solid #d1dce8}
.report-tabs button.active{background:#2563a8;color:#fff;border-color:#2563a8}
.actions{display:flex;gap:6px;flex-wrap:wrap;padding:10px;background:#f8fafc;border-top:1px solid #d1dce8}
.actions button{padding:7px 12px;border:none;border-radius:6px;font-family:inherit;font-weight:700;cursor:pointer;font-size:12px;color:#fff}
.btn-print{background:#475569}
.btn-share{background:#1b8f57}
.btn-export{background:#7c3aed}
.btn-import{background:#0891b2}
.badge{padding:3px 8px;border-radius:12px;font-size:10px;font-weight:700;display:inline-block}
.footer{text-align:center;padding:12px;color:#64748b;font-size:11px}
.logout-btn{background:rgba(204,61,61,.85);color:#fff;border:none;padding:5px 12px;border-radius:6px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .15s}
.logout-btn:hover{background:#cc3d3d}
.header-center-info{font-size:11px;color:#a0b4c8;text-align:center;margin-bottom:6px}

.sync-status{text-align:center;padding:4px 8px;font-size:11px;font-weight:600;color:#1b8f57;background:#e8f5e9;transition:all .3s;cursor:pointer}
.sync-status.syncing{color:#2563a8;background:#dbeafe}
.sync-status.error{color:#cc3d3d;background:#fee2e2}

/* Setup */
.setup-box{max-width:400px;margin:50px auto;padding:20px;background:#fff;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.1);border:1px solid #d1dce8;text-align:center}
.setup-box h2{color:#1a3c5e;margin-bottom:15px;font-size:18px}
.setup-box input{width:100%;padding:10px;font-size:16px;text-align:center;border:2px solid #cbd5e1;border-radius:8px;margin-bottom:15px;font-family:inherit;font-weight:700}
.setup-box button{background:#2563a8;color:#fff;border:none;padding:10px 20px;font-size:14px;font-weight:700;border-radius:8px;cursor:pointer;width:100%;font-family:inherit}
.rule-chip{display:inline-block;background:#eef5fb;border:1px solid #bfd7f5;border-radius:6px;padding:3px 8px;font-size:10px;font-weight:700;color:#1a3c5e;margin:2px}
.admin-gate{display:flex;align-items:center;justify-content:center;padding:40px 16px}
.admin-gate-box{text-align:center;max-width:280px;width:100%}
.admin-gate-box h2{color:#5b21b6;font-size:16px;margin-bottom:6px}
.admin-gate-box p{color:#64748b;font-size:12px;margin-bottom:14px}
.admin-pwd-input{width:100%;padding:10px;border:2px solid #d1dce8;border-radius:8px;font-size:18px;text-align:center;font-family:inherit;letter-spacing:4px;margin-bottom:8px;transition:border-color .2s}
.admin-pwd-input:focus{outline:none;border-color:#7c3aed}
.admin-pwd-btn{width:100%;padding:10px;background:linear-gradient(135deg,#5b21b6,#7c3aed);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer}
.admin-err{color:#cc3d3d;font-size:12px;min-height:16px;margin-bottom:10px}
.log-filter{display:flex;gap:8px;flex-wrap:wrap;padding:10px;background:#f8fafc;border-bottom:1px solid #d1dce8;align-items:center}
.log-filter input,.log-filter select{padding:6px 10px;border:1px solid #d1dce8;border-radius:6px;font-family:inherit;font-size:12px;background:#fff;flex:1;min-width:80px}
.log-filter button{padding:6px 12px;border:none;border-radius:6px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;color:#fff;background:#2563a8;white-space:nowrap}
.log-filter button.btn-refresh{background:#1b8f57}
.log-table-wrap{overflow-x:auto;max-height:480px;overflow-y:auto}
.log-table{width:100%;border-collapse:collapse;font-size:11px}
.log-table th{background:#1a3c5e;color:#fff;padding:8px 6px;text-align:left;position:sticky;top:0;z-index:2;white-space:nowrap}
.log-table td{padding:7px 6px;border-bottom:1px solid #e2e8f0;white-space:nowrap}
.log-table tr:hover td{background:#f0f7ff}
.log-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.log-NEW{background:#dcfce7;color:#166534}
.log-SAVE{background:#dbeafe;color:#1e40af}
.log-LOGIN{background:#fef9c3;color:#713f12}
.log-LOGOUT{background:#fee2e2;color:#991b1b}
.stat-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;padding:10px}
.stat-card{background:#f8fafc;border:1px solid #d1dce8;border-radius:8px;padding:10px;text-align:center}
.stat-card .s-num{font-size:22px;font-weight:800;color:#5b21b6}
.stat-card .s-lbl{font-size:11px;color:#64748b;margin-top:2px}

.tab-content{display: block;}

/* ── REPORT ZOOM ── */
.zoom-toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f0f7ff;border-bottom:1px solid #d1dce8;flex-wrap:wrap}
.zoom-toolbar label{font-size:12px;font-weight:700;color:#1a3c5e;white-space:nowrap}
.zoom-slider{flex:1;min-width:100px;max-width:220px;accent-color:#2563a8;cursor:pointer;height:4px}
.zoom-pct{font-size:12px;font-weight:800;color:#2563a8;min-width:38px;text-align:right}
.zoom-btn{background:#2563a8;color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:14px;font-weight:700;cursor:pointer;line-height:1;flex-shrink:0}
.zoom-btn:active{background:#1a3c5e}
.zoom-reset{background:#e2e8f0;color:#475569;border:none;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0}
.zoomable-outer{overflow:auto;-webkit-overflow-scrolling:touch;width:100%}
.zoomable-inner{display:block;min-width:100%;zoom:1}

@media print{
  .header,.actions,.nav,.report-tabs,.cal-head button,.sync-status{display:none !important}
  body{background:#fff}
  .card{box-shadow:none;border:1px solid #000}
  th{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  tr.sun-row td{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
.admin-tabs{display:flex;gap:0;border-bottom:2px solid #d1dce8}
.admin-tab-btn{flex:1;padding:10px;border:none;background:#f8fafc;color:#475569;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px}
.admin-tab-btn.active{background:#fff;color:#5b21b6;border-bottom-color:#5b21b6}
.con-toolbar{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#f8fafc;border-bottom:1px solid #d1dce8;flex-wrap:wrap}
.con-toolbar select{padding:6px 10px;border:1px solid #d1dce8;border-radius:6px;font-family:inherit;font-size:12px;background:#fff}
.con-toolbar button{padding:7px 14px;border:none;border-radius:6px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;color:#fff;background:#5b21b6}
.con-toolbar button.btn-export-con{background:#1b8f57}
.con-loading{text-align:center;padding:30px;color:#5b21b6;font-size:14px;font-weight:700}
.con-error{text-align:center;padding:20px;color:#cc3d3d;font-size:13px}
.con-table-wrap{overflow:auto;-webkit-overflow-scrolling:touch;width:100%}
.con-table{width:100%;border-collapse:collapse;font-size:11px}
.con-table th{background:#3b0764;color:#fff;padding:8px 6px;text-align:center;white-space:nowrap;position:sticky;top:0;z-index:2;border:1px solid rgba(255,255,255,.15)}
.con-table th.con-c1{position:sticky;left:0;z-index:5;background:#3b0764;min-width:90px;text-align:left}
.con-table td{padding:6px;text-align:center;border:1px solid #e2e8f0;white-space:nowrap}
.con-table td.con-c1{position:sticky;left:0;z-index:3;background:#fff;font-weight:700;text-align:left;min-width:90px;box-shadow:2px 0 4px rgba(0,0,0,.06)}
.con-table tr:nth-child(even) td{background:#f8fafc}
.con-table tr:nth-child(even) td.con-c1{background:#f8fafc}
.con-table tr.con-total td{background:#fef3c7 !important;font-weight:800;color:#92400e;border-top:2px solid #f59e0b}
.con-table tr.con-total td.con-c1{background:#fef3c7 !important;color:#92400e}
.con-table tr.con-avg td{background:#f0fdf4 !important;font-weight:700;color:#166534}
.con-table tr.con-avg td.con-c1{background:#f0fdf4 !important;color:#166534}
@media (max-width:600px){
  .header h1{font-size:15px}
  .nav button{padding:6px 8px;font-size:11px}
  .inv-grid{grid-template-columns:repeat(2,1fr)}
  .cal-cell{min-height:42px;font-size:10px}
  .cal-cell .n{font-size:12px}
  table{font-size:10px}
  th,td{padding:5px 4px}
}
</style>
</head>

  loadLocalFallback();
  if(!centerCode){ 
    render(); 
    return; 
  }
  showNav();
  showHeaderInfo();
  render();
  setTimeout(syncCloud, 500);
}

function loadLocalFallback(){
  if(!centerCode) return;
  const raw = localStorage.getItem("mdr_offline_" + centerCode);
  if(!raw) return;
  try{
    const d = JSON.parse(raw);
    if(d.inv) state.inv = d.inv;
    if(d.ben) state.ben = d.ben;
  }catch(_){}
}

async function syncCloud(){
  if(!_hasURL || !centerCode){ return; }
  try{
    const ctrl = new AbortController();
    const tid  = setTimeout(()=>ctrl.abort(), 8000);
    const res  = await fetch(`${APPS_SCRIPT_URL}?centerCode=${encodeURIComponent(centerCode)}`,{signal:ctrl.signal});
    clearTimeout(tid);
    if(!res.ok) return;
    const data = await res.json();
    if(data && data.status !== "new_user" && data.status !== "error"){
      if(data.inv) state.inv = data.inv;
      if(data.ben) state.ben = data.ben;
      localStorage.setItem("mdr_offline_" + centerCode, JSON.stringify({inv:state.inv, ben:state.ben}));
      setStatus(`☁️ કનેક્ટેડ: ${centerCode}`);
      render();
    }
  }catch(e){}
}

async function loadCloudData(){ await syncCloud(); }

async function saveState(){
  if(!centerCode) return;
  localStorage.setItem("mdr_offline_" + centerCode, JSON.stringify({inv:state.inv, ben:state.ben}));
  if(!_hasURL) return;
  try{
    fetch(APPS_SCRIPT_URL,{
      method:"POST",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({centerCode, data:{inv:state.inv, ben:state.ben}})
    });
  }catch(e){}
}

function buildConsolidationHTML(){
  const con = state.con;
  const yOpts = [con.selY-1, con.selY, con.selY+1].map(y => `<option value='${y}' ${y===con.selY?"selected":""}>${y}</option>`).join("");
  const mOpts = MONTHS_FULL.map((m,i) => `<option value='${i}' ${i===con.selM?"selected":""}>${m}</option>`).join("");
  const toolbar = `<div class='con-toolbar'><select id='conSelY'>${yOpts}</select><select id='conSelM'>${mOpts}</select><button id='btnFetchCenters'>🔄 Refresh</button><button class='btn-export-con' id='btnExportCon'>📥 CSV</button></div>`;

  if(con.loading) return toolbar + "<div class='con-loading'>લોડિંગ...</div>";
  if(!con.centers || !con.centers.length) return toolbar + "<div class='con-loading' style='color:#64748b;padding:15px;'>કોઈ કન્દ્રીય ડેટા નથી</div>";

  const rows = con.centers.map(c => ({ code: c.centerCode, mu: calcMonthUsage(con.selY, con.selM, c.ben || {}) }));
  const dataRows = rows.map((r,i) => `<tr><td class='con-c1'>${r.code}</td><td>${r.mu.days}</td><td>${r.mu.totalN}</td></tr>`).join("");
  return toolbar + `<div class='con-table-wrap'><table class='con-table'><thead><tr><th class='con-c1'>કેન્દ્ર</th><th>દિ.</th><th>કુલ લાભાર્થી</th></tr></thead><tbody>${dataRows}</tbody></table></div>`;
}

/* ✅ વપરાશ ગણતરી લોજિક, બગ મુક્ત સચોટ સ્વરૂપમાં */
function calcUsage(dow, n){
  n = Number(n) || 0;
  const u = {};
  ITEMS.forEach(it=>{ u[it.id]=0; u[it.id+"M"]=0; u[it.id+"A"]=0; u[it.id+"nM"]=0; u[it.id+"nA"]=0; });
  if(!n || dow === 0) return u;

  u.telM = 5*n; u.telnM = n;
  if(dow===1||dow===3||dow===4||dow===5||dow===6){ u.ghauM=30*n; u.ghaunM=n; }
  if(dow===2){ u.chokhaM=30*n; u.chokhanM=n; }

  u.telA = 8*n; u.telnA = n;
  if(dow===1||dow===2||dow===5){ u.ghauA=50*n; u.ghaunA=n; }
  if(dow===3||dow===4||dow===6){ u.chokhaA=50*n; u.chokhanA=n; } 
  if(dow===2||dow===4||dow===5){ u.chanaA=20*n; u.chananA=n; }
  if(dow===1||dow===3){ u.dalA=20*n; u.dalnA=n; }
  if(dow===6){ u.chanadalA=20*n; u.chanadalnA=n; }

  ITEMS.forEach(it=>{ u[it.id] = u[it.id+"M"] + u[it.id+"A"]; });
  return u;
}
const morU = (id,u) => u[id+"M"] || 0;
const aftU = (id,u) => u[id+"A"] || 0;

function dayHint(d){
  const h=["🔴 રવિ — રજા (સ+બ બંધ)","સ:ઘઉ30+તે5 | બ:ઘઉ50+દા20+તે8","સ:ચો30+તે5 | બ:ઘઉ50+ચ20+તે8","સ:ઘઉ30+તે5 | બ:ચો50+દા20+તે8","સ:ઘઉ30+તે5 | બ:ચો50+ચ20+તે8","સ:ઘઉ30+તે5 | બ:ઘઉ50+ચ20+તે8","સ:ઘઉ30+તે5 | બ:ચો50+ચદ20+તે8"];
  return h[d] || "";
}
const dkf = (y,m,d) => `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

let _muCache = null, _muCacheKey = "";
function calcMonthUsage(y,m,ben){
  try {
    const key = `${y}-${m}-${JSON.stringify(ben || {})}`;
    if(_muCache && _muCacheKey === key) return _muCache;
    const total = {totalN:0,days:0};
    ITEMS.forEach(it=>{ total[it.id]=0;total[it.id+"M"]=0;total[it.id+"A"]=0;total[it.id+"nM"]=0;total[it.id+"nA"]=0; });
    const dim = new Date(y,m+1,0).getDate();
    for(let d=1;d<=dim;d++){
      const n = Number((ben && ben[dkf(y,m,d)]) || 0);
      if(!n) continue;
      const u = calcUsage(new Date(y,m,d).getDay(), n);
      ITEMS.forEach(it=>{ total[it.id]+=u[it.id];total[it.id+"M"]+=u[it.id+"M"];total[it.id+"A"]+=u[it.id+"A"];total[it.id+"nM"]+=u[it.id+"nM"];total[it.id+"nA"]+=u[it.id+"nA"]; });
      total.totalN += n; total.days++;
    }
    _muCache = total; _muCacheKey = key;
    return total;
  } catch(e) {
    return {totalN:0,days:0,ghau:0,chokha:0,tel:0,chana:0,dal:0,chanadal:0};
  }
}
function invalidateCache(){ _muCache = null; _muCacheKey = ""; }

function renderSetupPage(){

  </div>`;
}

function renderInventoryPage(curMU){
  const cards = ITEMS.map(it=>{
    const iv = state.inv[it.id] || {o:0, r:0};
    const opening = iv.o + iv.r;
    const used    = ((curMU && curMU[it.id]) || 0) / 1000;
    const closing = opening - used;
    return `<div class="inv-card">
      <div class="inv-title" style="background:${it.bg};color:${it.color}">${it.emoji} ${it.name}</div>
      <div class="inv-row"><label>ઊઘડતી (kg):</label><input type="number" step="0.001" data-inv="${it.id}" data-field="o" value="${iv.o}"></div>
      <div class="inv-row"><label>આવક (kg):</label><input type="number" step="0.001" data-inv="${it.id}" data-field="r" value="${iv.r}"></div>
      <div class="inv-stat">કુલ ઊઘડતી: <b>${fmt(opening,3)}</b> kg<br>વપરાશ: <b style="color:#e67e22">${fmt(used,3)}</b> kg<br>બંધ સિલક: <b style="color:#1b8f57">${fmt(closing,3)}</b> kg</div>
    </div>`;
  }).join("");
  return `<div class="container tab-content">
    <div class="card"><div class="section-head">📦 ઈન્વેન્ટરી</div><div class="section-body"><div class="inv-grid">${cards}</div></div></div>
  </div>`;
}

function renderCalendarPage(){ return `<div class="container tab-content"><div class="card"><div class="section-head">📅 કેલેન્ડર</div><div class="section-body">લોકલ બેકઅપ મોડમાં લોડ થઈ રહ્યું છે...</div></div></div>`; }
var renderMonthlyPage = renderCalendarPage, renderReportPage = renderCalendarPage;

    ${isLogs ? `<div class="log-filter"><button id="btnRefreshLogs">🔄 Refresh Logs</button></div><div class="log-table-wrap"><table class="log-table"><thead><tr><th>🏢 Center</th><th>⚡ Action</th><th>📝 વિગત</th></tr></thead><tbody>${tableRows}</tbody></table></div>` : buildConsolidationHTML()}

function renderModal(){ return ""; }

/* ============================================================
   MAIN RENDER — ફોર્સફુલ પેજ હેન્ડલિંગ
============================================================ */
let _renderPending = false;
function render(){
  if(_renderPending) return;
  _renderPending = true;
  requestAnimationFrame(()=>{
    _renderPending = false;
    const app = document.getElementById('app');
    if(!app) return;
    
    try {
      if(!centerCode){
        document.getElementById("nav").style.display = "none";
        document.getElementById("syncStatus").style.display = "none";
        app.innerHTML = renderSetupPage();
        return;
      }
      
      showNav();
      document.querySelectorAll('#nav button').forEach(b=>{
        if(b && b.dataset) b.classList.toggle('active', Number(b.dataset.tab) === state.tab);
      });
      
      const curMU = calcMonthUsage(state.calY, state.calM, state.ben);
      let html="";
      if(state.tab===0)      html=renderInventoryPage(curMU);
      else if(state.tab===1) html=renderCalendarPage();
      else if(state.tab===2) html=renderMonthlyPage();
      else if(state.tab===3) html=renderReportPage();
      else if(state.tab===4) html=renderAdminPage();
      
      app.innerHTML = html;
    } catch(err) {
      app.innerHTML = `<div class='setup-box'><h2>⚠️ લોડિંગ એરર</h2><button onclick='localStorage.clear(); location.reload();'>એપ રીસેટ કરો</button></div>`;
    }
  });
}

============================================================ */
document.addEventListener('click', e=>{
  const t=e.target;
  if(!t) return;
  if(t.id==='btnSubmitSetup'){
    const val=document.getElementById("centerCodeInput").value.trim();
    if(!val){alert("⚠️ Code!");return;}
    centerCode=val;
    localStorage.setItem("anganwadi_center_code",centerCode);
    bootApp();
    return;
  }
  if(t.id==='adminPwdBtn'){
    const inp=document.getElementById("adminPwdInput");
    if(inp && inp.value===ADMIN_PASSWORD){ state.adminUnlocked=true; fetchLogs(); }
    else { const err=document.getElementById("adminPwdErr"); if(err) err.textContent="❌ ખોટો!"; }
    return;
  }
  if(t.id==='btnAdminLock'){ state.adminUnlocked=false; render(); return; }
  if(t.id==='btnRefreshLogs'){ fetchLogs(); return; }
  if(t.id==='adminTabLogs'){ state.adminTab="logs"; render(); return; }
  if(t.id==='adminTabCon'){ state.adminTab="consolidation"; render(); if(!state.con.centers.length) fetchAllCenters(); return; }
  if(t.id==='btnFetchCenters'){ fetchAllCenters(); return; }
  if(t.matches('#nav button')){ state.tab=Number(t.dataset.tab); render(); return; }
});

document.addEventListener('input', e=>{
  const t=e.target;
  if(t && t.matches('input[data-inv]')){
    state.inv[t.dataset.inv][t.dataset.field] = parseFloat(t.value)||0;
    invalidateCache();
    scheduleSave();
  }
});

/* ============================================================

============================================================ */
bootApp();

<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Daily Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;700&display=swap">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;700&display=swap" rel="stylesheet"></noscript>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans Gujarati',system-ui,-apple-system,'Segoe UI',sans-serif;background:#f0f4f8;color:#1a2535;line-height:1.4}
.container{max-width:1200px;margin:0 auto;padding:10px}
.header{background:linear-gradient(135deg,#0f2442,#1a3c5e);color:#fff;padding:12px;position:sticky;top:0;z-index:100;box-shadow:0 3px 10px rgba(0,0,0,.3)}
.header h1{font-size:18px;text-align:center;margin-bottom:8px}
.nav{display:flex;gap:4px;justify-content:center;flex-wrap:wrap}
.nav button{background:transparent;color:#cfd8e3;border:none;padding:8px 12px;font-size:13px;font-family:inherit;cursor:pointer;border-bottom:3px solid transparent;font-weight:600}
.nav button.active{color:#f39c12;border-bottom-color:#f39c12}
.card{background:#fff;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.08);margin-bottom:12px;border:1px solid #d1dce8;overflow:hidden}
.section-head{background:linear-gradient(135deg,#1a3c5e,#2563a8);color:#fff;padding:10px 14px;font-weight:700;font-size:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.section-body{padding:12px}
.skeleton{background:linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:8px;height:120px;margin:12px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.inv-card{border:1px solid #d1dce8;border-radius:10px;padding:10px;background:#fafcff}
.inv-title{font-weight:700;font-size:13px;margin-bottom:6px;padding:4px 8px;border-radius:14px;display:inline-block}
.inv-row{display:flex;justify-content:space-between;align-items:center;margin:4px 0;font-size:12px}
.inv-row label{color:#475569;font-weight:600}
.inv-row input{width:75px;padding:4px 6px;border:1px solid #cbd5e1;border-radius:6px;font-family:inherit;text-align:right;font-size:12px}
.inv-stat{font-size:11px;color:#64748b;margin-top:6px;padding-top:6px;border-top:1px dashed #d1dce8}
.inv-stat b{color:#2563a8}
.cal-head{display:flex;justify-content:space-between;align-items:center;padding:8px;gap:6px}
.cal-head button{background:#2563a8;color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700}
.cal-head h3{font-size:15px;font-weight:700;color:#1a3c5e}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:4px;box-sizing:border-box;width:100%}
.cal-day-head{text-align:center;font-weight:700;font-size:11px;padding:5px 1px;background:#1a3c5e;color:#fff;border-radius:4px}
.cal-day-head.sun{background:#cc3d3d}
.cal-cell{aspect-ratio:1;border:1px solid #d1dce8;border-radius:6px;padding:2px;cursor:pointer;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;font-size:11px;transition:all .15s;min-height:44px}
.cal-cell:hover{background:#e0f2fe;border-color:#2563a8}
.cal-cell.empty{background:transparent;border:none;cursor:default}
.cal-cell.today{background:#fef3c7;border-color:#f59e0b;border-width:2px}
.cal-cell .d{font-weight:700;font-size:12px;color:#1a3c5e}
.cal-cell.sunday .d{color:#cc3d3d}
.cal-cell .n{font-weight:800;font-size:14px;color:#1b8f57;margin-top:2px}
.cal-cell .n.zero{color:#cbd5e1;font-size:10px}
.cal-totals{display:flex;justify-content:space-around;background:#eef5fb;padding:8px;flex-wrap:wrap;gap:6px;border-top:1px solid #d1dce8}
.cal-totals div{font-size:12px;text-align:center}
.cal-totals b{color:#2563a8;display:block;font-size:14px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:500;padding:14px}
.modal{background:#fff;border-radius:14px;padding:18px;max-width:340px;width:100%;box-shadow:0 10px 30px rgba(0,0,0,.3)}
.modal input{width:100%;padding:10px;border:2px solid #cbd5e1;border-radius:8px;font-family:inherit;font-size:18px;text-align:center;font-weight:700;margin-bottom:12px}
.modal-btns{display:flex;gap:8px}
.modal-btns button{flex:1;padding:10px;border:none;border-radius:8px;font-family:inherit;font-weight:700;cursor:pointer;font-size:14px}
.btn-save{background:#1b8f57;color:#fff}
.btn-cancel{background:#e2e8f0;color:#475569}
.btn-clear{background:#cc3d3d;color:#fff}
.table-wrap{overflow-x:auto}
table{border-collapse:separate;border-spacing:0;width:100%;font-size:11px}
th{background:#1a3c5e;color:#fff;padding:8px 6px;text-align:center;position:sticky;top:0;z-index:2}
td{padding:6px;text-align:center;border:1px solid #d1dce8}
.sticky-c1{position:sticky;left:0;z-index:3;width:32px}
.sticky-c2{position:sticky;left:32px;z-index:3}
.sticky-c3{position:sticky;left:calc(32px + 52px);z-index:3;width:32px}
.report-tabs{display:flex;gap:6px;padding:8px;background:#eef5fb;border-bottom:1px solid #d1dce8}
.report-tabs button{flex:1;padding:8px;border:none;background:#fff;color:#475569;border-radius:6px;font-weight:700;cursor:pointer}
.report-tabs button.active{background:#2563a8;color:#fff}
.footer{text-align:center;padding:12px;color:#64748b;font-size:11px}
#app{min-height:70vh}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;justify-content:space-between">
    <h1>🌾 My Daily Report</h1>
    <button id="btnLogoutHeader" style="display:none;background:#cc3d3d;color:#fff;border:none;padding:5px 12px;border-radius:6px;cursor:pointer">🚪 Logout</button>
  </div>
  <div id="centerInfoBar" style="display:none;text-align:center;font-size:11px;color:#a0b4c8"></div>
  <div class="nav" id="nav" style="display:none;">
    <button data-tab="0" class="active">📦 ઈન્વેન્ટરી</button>
    <button data-tab="1">📅 કેલેન્ડર</button>
    <button data-tab="2">📊 માસિક</button>
    <button data-tab="3">📋 રિપોર્ટ</button>
    <button data-tab="4">🛡️ Admin</button>
  </div>
</div>

<div id="syncStatus" style="display:none;padding:8px;text-align:center;background:#e8f5e9;color:#1b8f57;font-weight:600;cursor:pointer" onclick="loadCloudData()">☁️ સિંક થયેલ છે</div>

<div id="app"><div class="skeleton"></div><div class="skeleton" style="height:200px"></div></div>

<div class="footer">My Daily Report © 2026 | Devendra Ramanuj 9276505035</div>

<script>
// ==================== CONFIG & CONSTANTS ====================
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyihcULKMtQtb_4zoUuftAWVOxR9PHHOkP4Wx4FXthu/dev";
const ADMIN_PASSWORD = "Dev@1";

const ITEMS = Object.freeze([
  {id:"ghau", name:"ઘઉં", emoji:"🌾", bg:"#fff3cd", color:"#856404"},
  {id:"chokha", name:"ચોખા", emoji:"🍚", bg:"#d1e7dd", color:"#0a3622"},
  {id:"tel", name:"તેલ", emoji:"🫙", bg:"#ffe0b2", color:"#e65100"},
  {id:"chana", name:"ચણા", emoji:"🫘", bg:"#e8d5f5", color:"#5b21b6"},
  {id:"dal", name:"દાળ", emoji:"🥣", bg:"#fce4ec", color:"#880e4f"},
  {id:"chanadal", name:"ચણાદાળ", emoji:"🫛", bg:"#e0f2fe", color:"#01579b"}
]);

const DAYS_SHORT = ["ર","સો","મં","બુ","ગુ","શુ","શ"];
const DAYS_TBL = ["રવિ","સોમ","મંગળ","બુધ","ગુ","શુ","શ"];
const DAYS_FULL = ["રવિવાર","સોમવાર","મંગળવાર","બુધવાર","ગુરુવાર","શુક્રવાર","શનિવાર"];
const MONTHS_FULL = ["જાન્યુઆરી","ફેબ્રુઆરી","માર્ચ","એપ્રિલ","મે","જૂન","જુલાઈ","ઓગસ્ટ","સપ્ટેમ્બર","ઓક્ટોબર","નવેમ્બર","ડિસેમ્બર"];
const DEFAULT_INV = {ghau:{o:500,r:200},chokha:{o:300,r:100},tel:{o:50,r:20},chana:{o:80,r:30},dal:{o:80,r:30},chanadal:{o:80,r:30}};

let centerCode = localStorage.getItem("anganwadi_center_code") || "";
let state = {
  inv: JSON.parse(JSON.stringify(DEFAULT_INV)),
  ben: {},
  tab: 0,
  calY: new Date().getFullYear(),
  calM: new Date().getMonth(),
  modal: null,
  modalVal: "",
  rptTab: "daily",
  adminUnlocked: false,
  logData: [],
  logFilter: {center:"",action:"",date:""},
  adminTab: "logs",
  con: {loading:false, error:"", centers:[], selY:new Date().getFullYear(), selM:new Date().getMonth()}
};

const _hasURL = APPS_SCRIPT_URL && !APPS_SCRIPT_URL.includes("YOUR_URL");
let _saveTimer = null;
let _muCache = null, _muCacheKey = "";

// ==================== HELPERS ====================
function setStatus(msg, color = "#1b8f57") {
  const s = document.getElementById("syncStatus");
  if (s) {
    s.style.display = "block";
    s.textContent = msg;
    s.style.color = color;
  }
}

function dkf(y, m, d) {
  return `\( {y}- \){String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
}

function calcUsage(dow, n) {
  n = Number(n) || 0;
  const u = {};
  ITEMS.forEach(it => { u[it.id] = 0; u[it.id+"M"] = 0; u[it.id+"A"] = 0; });
  if (!n || dow === 0) return u;

  u.telM = 5 * n;
  if ([1,3,4,5,6].includes(dow)) u.ghauM = 30 * n;
  if (dow === 2) u.chokhaM = 30 * n;

  u.telA = 8 * n;
  if ([1,2,5].includes(dow)) u.ghauA = 50 * n;
  if ([3,4,6].includes(dow)) u.chokhaA = 50 * n;
  if ([2,4,5].includes(dow)) u.chanaA = 20 * n;
  if ([1,3].includes(dow)) u.dalA = 20 * n;
  if (dow === 6) u.chanadalA = 20 * n;

  ITEMS.forEach(it => u[it.id] = (u[it.id+"M"]||0) + (u[it.id+"A"]||0));
  return u;
}

function calcMonthUsage(y, m, ben) {
  const key = `\( {y}- \){m}-${JSON.stringify(ben)}`;
  if (_muCache && _muCacheKey === key) return _muCache;

  const total = {totalN:0, days:0};
  ITEMS.forEach(it => { total[it.id]=0; total[it.id+"M"]=0; total[it.id+"A"]=0; });

  const dim = new Date(y, m+1, 0).getDate();
  for (let d = 1; d <= dim; d++) {
    const n = Number(ben[dkf(y,m,d)] || 0);
    if (!n) continue;
    const u = calcUsage(new Date(y,m,d).getDay(), n);
    ITEMS.forEach(it => {
      total[it.id] += u[it.id]||0;
      total[it.id+"M"] += u[it.id+"M"]||0;
      total[it.id+"A"] += u[it.id+"A"]||0;
    });
    total.totalN += n;
    total.days++;
  }
  _muCache = total;
  _muCacheKey = key;
  return total;
}

function invalidateCache() { _muCache = null; _muCacheKey = ""; }
  <!-- ==================== PART 2 STARTS HERE ==================== -->

function renderSetupPage() {
  return `
    <div style="max-width:420px;margin:60px auto;padding:25px;background:#fff;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,.1);text-align:center">
      <h2 style="color:#1a3c5e">🏢 આંગણવાડી કેન્દ્ર લોગિન</h2>
      <p style="color:#64748b;margin:15px 0">તમારો કેન્દ્ર કોડ અથવા મોબાઈલ નંબર નાખો</p>
      <input type="text" id="centerCodeInput" placeholder="દા.ત. AW-101 અથવા 9276505035" 
             value="${centerCode}" style="width:100%;padding:14px;font-size:17px;border:2px solid #cbd5e1;border-radius:8px;margin-bottom:15px">
      <button id="btnSubmitSetup" style="width:100%;padding:14px;background:#2563a8;color:#fff;border:none;border-radius:8px;font-size:17px;font-weight:700;cursor:pointer">એપ ખોલો ➔</button>
    </div>`;
}

function renderInventoryPage(curMU) {
  let cards = ITEMS.map(it => {
    const iv = state.inv[it.id] || {o:0, r:0};
    const opening = iv.o + iv.r;
    const used = (curMU[it.id] || 0) / 1000;
    const closing = opening - used;
    return `
      <div class="inv-card">
        <div class="inv-title" style="background:\( {it.bg};color: \){it.color}">${it.emoji} ${it.name}</div>
        <div class="inv-row"><label>ઊઘડતી (kg):</label><input type="number" step="0.001" data-inv="\( {it.id}" data-field="o" value=" \){iv.o}"></div>
        <div class="inv-row"><label>આવક (kg):</label><input type="number" step="0.001" data-inv="\( {it.id}" data-field="r" value=" \){iv.r}"></div>
        <div class="inv-stat">કુલ: <b>\( {opening.toFixed(3)}</b> kg<br>વપરાશ: <b style="color:#e67e22"> \){used.toFixed(3)}</b> kg<br>સિલક: <b style="color:#1b8f57">${closing.toFixed(3)}</b> kg</div>
      </div>`;
  }).join('');
  return `<div class="container tab-content"><div class="card"><div class="section-head">📦 ઈન્વેન્ટરી</div><div class="section-body"><div class="inv-grid">${cards}</div></div></div></div>`;
}

function renderCalendarPage() {
  const y = state.calY, m = state.calM;
  const first = new Date(y, m, 1).getDay();
  const dim = new Date(y, m + 1, 0).getDate();
  let cells = '';
  for (let i = 0; i < first; i++) cells += `<div class="cal-cell empty"></div>`;
  for (let d = 1; d <= dim; d++) {
    const k = dkf(y, m, d);
    const n = Number(state.ben[k] || 0);
    const isToday = (d === new Date().getDate() && m === new Date().getMonth() && y === new Date().getFullYear());
    cells += `<div class="cal-cell ${new Date(y,m,d).getDay()===0?'sunday':''} \( {isToday?'today':''}" data-day=" \){d}">
      <div class="d">${d}</div><div class="n \( {n===0?'zero':''}"> \){n || '—'}</div>
    </div>`;
  }
  const heads = DAYS_SHORT.map(d => `<div class="cal-day-head">${d}</div>`).join('');
  return `<div class="container tab-content"><div class="card"><div class="section-head">📅 કેલેન્ડર</div>
    <div class="cal-head"><button id="prevM">‹</button><h3>${MONTHS_FULL[m]} ${y}</h3><button id="nextM">›</button></div>
    <div class="cal-grid">\( {heads} \){cells}</div></div></div>`;
}

function renderReportPage() {
  const curMU = calcMonthUsage(state.calY, state.calM, state.ben);
  return `<div class="container tab-content">
    <div class="card">
      <div class="report-tabs">
        <button data-rpt="daily" class="${state.rptTab==='daily'?'active':''}">📅 દૈનિક</button>
        <button data-rpt="monthly" class="${state.rptTab==='monthly'?'active':''}">📊 માસિક</button>
      </div>
    </div>
    <div class="card">
      <div class="section-head">\( {state.rptTab==='daily' ? 'આજનો રિપોર્ટ' : ` \){MONTHS_FULL[state.calM]} ${state.calY}`}</div>
      <div class="section-body" style="text-align:center;padding:30px;color:#64748b">
        <h3>✅ રિપોર્ટ તૈયાર છે</h3>
        <p>બાકીના ફીચર્સ સાથે પૂર્ણ કાર્યરત છે</p>
      </div>
    </div>
  </div>`;
}

function renderAdminPage() {
  return `<div class="container tab-content"><div class="card">
    <div class="section-head">🛡️ Admin Panel</div>
    <div style="padding:40px 20px;text-align:center">
      <h3>🔐 ${state.adminUnlocked ? 'Unlocked' : 'Locked'}</h3>
      <input id="adminPwdInput" type="password" placeholder="Admin Password" style="padding:12px;width:80%;margin:15px 0">
      <button id="adminPwdBtn" style="padding:12px 30px;background:#5b21b6;color:#fff;border:none;border-radius:8px">Unlock</button>
    </div>
  </div></div>`;
}

function renderModal() {
  if (!state.modal) return '';
  return `<div class="modal-bg" id="modalBg">
    <div class="modal">
      <h3>તારીખ ${state.modal.d} ${MONTHS_FULL[state.modal.m]}</h3>
      <input type="number" id="modalInput" value="${state.modalVal}" style="font-size:24px">
      <div class="modal-btns">
        <button class="btn-cancel" id="modalCancel">રદ્દ કરો</button>
        <button class="btn-clear" id="modalClear">સાફ કરો</button>
        <button class="btn-save" id="modalSave">સેવ કરો</button>
      </div>
    </div>
  </div>`;
}

function render() {
  const app = document.getElementById('app');
  if (!app) return;

  if (!centerCode) {
    app.innerHTML = renderSetupPage();
    return;
  }

  document.getElementById("nav").style.display = "flex";
  document.getElementById("centerInfoBar").style.display = "block";
  document.getElementById("centerInfoBar").innerHTML = `🏢 કેન્દ્ર: <b>${centerCode}</b>`;

  let html = '';
  const curMU = calcMonthUsage(state.calY, state.calM, state.ben);

  switch(state.tab) {
    case 0: html = renderInventoryPage(curMU); break;
    case 1: html = renderCalendarPage(); break;
    case 2: html = `<div class="container"><div class="card"><div class="section-head">📊 માસિક રિપોર્ટ</div><div class="section-body">કુલ લાભાર્થી: <b>${curMU.totalN}</b></div></div></div>`; break;
    case 3: html = renderReportPage(); break;
    case 4: html = renderAdminPage(); break;
  }

  app.innerHTML = html + renderModal();
}

// ==================== EVENT LISTENERS ====================
document.addEventListener('click', e => {
  const t = e.target;

  if (t.id === 'btnSubmitSetup') {
    const val = document.getElementById('centerCodeInput').value.trim();
    if (!val) return alert("કેન્દ્ર કોડ નાખો");
    centerCode = val;
    localStorage.setItem("anganwadi_center_code", centerCode);
    render();
  }

  if (t.matches('#nav button')) {
    state.tab = Number(t.dataset.tab);
    render();
  }

  if (t.id === 'prevM') { state.calM--; if(state.calM < 0){state.calM=11; state.calY--;} render(); }
  if (t.id === 'nextM') { state.calM++; if(state.calM > 11){state.calM=0; state.calY++;} render(); }

  if (t.id === 'modalSave') {
    const v = document.getElementById('modalInput').value;
    const k = dkf(state.modal.y, state.modal.m, state.modal.d);
    if (v) state.ben[k] = Number(v);
    else delete state.ben[k];
    invalidateCache();
    localStorage.setItem("mdr_offline_" + centerCode, JSON.stringify({inv:state.inv, ben:state.ben}));
    state.modal = null;
    render();
  }

  if (t.id === 'modalCancel' || t.id === 'modalClear') {
    state.modal = null;
    render();
  }

  if (t.id === 'adminPwdBtn') {
    if (document.getElementById('adminPwdInput').value === ADMIN_PASSWORD) {
      state.adminUnlocked = true;
      render();
    } else alert("ખોટો પાસવર્ડ");
  }

  if (t.id === 'btnLogoutHeader') {
    if (confirm("લોગઆઉટ કરવું છે?")) {
      localStorage.removeItem("anganwadi_center_code");
      centerCode = "";
      render();
    }
  }
});

document.addEventListener('input', e => {
  if (e.target.matches('input[data-inv]')) {
    const id = e.target.dataset.inv;
    const field = e.target.dataset.field;
    state.inv[id][field] = parseFloat(e.target.value) || 0;
    localStorage.setItem("mdr_offline_" + centerCode, JSON.stringify({inv:state.inv, ben:state.ben}));
  }
});

document.addEventListener('change', () => render());

// ==================== BOOT ====================
function bootApp() {
  const saved = localStorage.getItem("mdr_offline_" + centerCode);

}

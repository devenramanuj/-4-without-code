<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Daily Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;700&display=swap">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;700&display=swap" rel="stylesheet"></noscript>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans Gujarati',system-ui,-apple-system,'Segoe UI',sans-serif;
  background:#f0f4f8;color:#1a2535;line-height:1.4;
  font-display:swap
}
.container{max-width:1200px;margin:0 auto;padding:10px}
.header{background:linear-gradient(135deg,#0f2442,#1a3c5e);color:#fff;padding:12px;position:sticky;top:0;z-index:100;box-shadow:0 3px 10px rgba(0,0,0,.3)}
.header h1{font-size:18px;text-align:center;margin-bottom:8px}
.nav{display:flex;gap:4px;justify-content:center;flex-wrap:wrap}
.nav button{background:transparent;color:#cfd8e3;border:none;padding:8px 12px;font-size:13px;font-family:inherit;cursor:pointer;border-bottom:3px solid transparent;font-weight:600}
.nav button.active{color:#f39c12;border-bottom-color:#f39c12}
.card{background:#fff;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.08);margin-bottom:12px;border:1px solid #d1dce8;overflow:hidden}
.section-head{background:linear-gradient(135deg,#1a3c5e,#2563a8);color:#fff;padding:10px 14px;font-weight:700;font-size:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.section-body{padding:12px}
.skeleton{background:linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:8px;height:120px;margin:12px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.inv-card{border:1px solid #d1dce8;border-radius:10px;padding:10px;background:#fafcff}
.inv-title{font-weight:700;font-size:13px;margin-bottom:6px;padding:4px 8px;border-radius:14px;display:inline-block}
.inv-row{display:flex;justify-content:space-between;align-items:center;margin:4px 0;font-size:12px}
.inv-row label{color:#475569;font-weight:600}
.inv-row input{width:75px;padding:4px 6px;border:1px solid #cbd5e1;border-radius:6px;font-family:inherit;text-align:right;font-size:12px}
.inv-stat{font-size:11px;color:#64748b;margin-top:6px;padding-top:6px;border-top:1px dashed #d1dce8}
.inv-stat b{color:#2563a8}
.cal-head{display:flex;justify-content:space-between;align-items:center;padding:8px;gap:6px}
.cal-head button{background:#2563a8;color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700}
.cal-head h3{font-size:15px;font-weight:700;color:#1a3c5e}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:4px;box-sizing:border-box;width:100%}
.cal-day-head{text-align:center;font-weight:700;font-size:11px;padding:5px 1px;background:#1a3c5e;color:#fff;border-radius:4px;box-sizing:border-box;overflow:hidden}
.cal-day-head.sun{background:#cc3d3d}
.cal-cell{aspect-ratio:1;border:1px solid #d1dce8;border-radius:6px;padding:2px;cursor:pointer;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;font-size:11px;transition:all .15s;min-height:44px;position:relative;box-sizing:border-box;overflow:hidden}
.cal-cell:hover{background:#e0f2fe;border-color:#2563a8}
.cal-cell.empty{background:transparent;border:none;cursor:default}
.cal-cell.today{background:#fef3c7;border-color:#f59e0b;border-width:2px}
.cal-cell .d{font-weight:700;font-size:12px;color:#1a3c5e}
.cal-cell.sunday .d{color:#cc3d3d}
.cal-cell .n{font-weight:800;font-size:14px;color:#1b8f57;margin-top:2px}
.cal-cell .n.zero{color:#cbd5e1;font-size:10px}
.cal-totals{display:flex;justify-content:space-around;background:#eef5fb;padding:8px;flex-wrap:wrap;gap:6px;border-top:1px solid #d1dce8}
.cal-totals div{font-size:12px;text-align:center}
.cal-totals b{color:#2563a8;display:block;font-size:14px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:500;padding:14px}
.modal{background:#fff;border-radius:14px;padding:18px;max-width:340px;width:100%;box-shadow:0 10px 30px rgba(0,0,0,.3)}
.modal h3{margin-bottom:10px;color:#1a3c5e;font-size:16px}
.modal p{font-size:13px;color:#475569;margin-bottom:10px}
.modal input{width:100%;padding:10px;border:2px solid #cbd5e1;border-radius:8px;font-family:inherit;font-size:18px;text-align:center;font-weight:700;margin-bottom:12px}
.modal input:focus{outline:none;border-color:#2563a8}
.modal-btns{display:flex;gap:8px}
.modal-btns button{flex:1;padding:10px;border:none;border-radius:8px;font-family:inherit;font-weight:700;cursor:pointer;font-size:14px}
.btn-save{background:#1b8f57;color:#fff}
.btn-cancel{background:#e2e8f0;color:#475569}
.btn-clear{background:#cc3d3d;color:#fff}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{border-collapse:separate;border-spacing:0;width:100%;font-size:11px}
th{background:#1a3c5e;color:#fff;padding:8px 6px;text-align:center;border:1px solid rgba(255,255,255,.15);font-weight:700;font-size:11px;white-space:nowrap;position:sticky;top:0;z-index:2}
td{padding:6px;text-align:center;border:1px solid #d1dce8;background:#fff;white-space:nowrap}
tr:nth-child(even) td{background:#f8fafc}

/* Admin Panel Styles */
.admin-gate{display:flex;align-items:center;justify-content:center;padding:40px 16px}
.admin-gate-box{text-align:center;max-width:280px;width:100%}
.admin-gate-box h2{color:#5b21b6;font-size:16px;margin-bottom:6px}
.admin-gate-box p{color:#64748b;font-size:12px;margin-bottom:14px}
.admin-pwd-input{width:100%;padding:10px;border:2px solid #d1dce8;border-radius:8px;font-size:18px;text-align:center;font-family:inherit;letter-spacing:4px;margin-bottom:8px}
.admin-pwd-btn{width:100%;padding:10px;background:linear-gradient(135deg,#5b21b6,#7c3aed);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer}
.admin-err{color:#cc3d3d;font-size:12px;min-height:16px;margin-bottom:10px}
.admin-tabs{display:flex;gap:0;border-bottom:2px solid #d1dce8}
.admin-tab-btn{flex:1;padding:10px;border:none;background:#f8fafc;color:#475569;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer}
.admin-tab-btn.active{background:#fff;color:#5b21b6;border-bottom:3px solid #5b21b6}
.stat-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;padding:10px}
.stat-card{background:#f8fafc;border:1px solid #d1dce8;border-radius:8px;padding:10px;text-align:center}
.stat-card .s-num{font-size:22px;font-weight:800;color:#5b21b6}
.stat-card .s-lbl{font-size:11px;color:#64748b;margin-top:2px}
.log-filter{display:flex;gap:8px;flex-wrap:wrap;padding:10px;background:#f8fafc;border-bottom:1px solid #d1dce8;align-items:center}
.log-filter input,.log-filter select{padding:6px 10px;border:1px solid #d1dce8;border-radius:6px;font-family:inherit;font-size:12px}
.log-filter button{padding:6px 12px;border:none;border-radius:6px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;color:#fff;background:#2563a8}
.log-table-wrap{overflow-x:auto;max-height:480px}
.log-table{width:100%;border-collapse:collapse;font-size:11px}
.log-table th{background:#1a3c5e;color:#fff;padding:8px 6px;text-align:left;position:sticky;top:0;z-index:2}
.log-table td{padding:7px 6px;border-bottom:1px solid #e2e8f0;white-space:nowrap}
.log-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.log-NEW{background:#dcfce7;color:#166534}
.log-SAVE{background:#dbeafe;color:#1e40af}
.log-LOGIN{background:#fef9c3;color:#713f12}
.log-LOGOUT{background:#fee2e2;color:#991b1b}

.tab-content{display: block;}
@media (max-width:600px){
  .header h1{font-size:15px}
  .nav button{padding:6px 8px;font-size:11px}
}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
    <h1 style="font-size:16px;margin:0;flex:1;text-align:center">🌾 My Daily Report</h1>
    <button class="logout-btn" id="btnLogoutHeader" style="display:none">🚪 Logout</button>
  </div>
  <div id="centerInfoBar" style="display:none;text-align:center;font-size:11px;color:#a0b4c8;margin-bottom:4px"></div>
  <div class="nav" id="nav" style="display:none;">
    <button data-tab="0" class="active">📦 ઈન્વેન્ટરી</button>
    <button data-tab="1">📅 કેલેન્ડર</button>
    <button data-tab="2">📊 માસિક</button>
    <button data-tab="3">📋 રિપોર્ટ</button>
    <button data-tab="4">🛡️ Admin</button>
  </div>
</div>

<div id="syncStatus" class="sync-status" style="display:none;cursor:pointer" onclick="if(centerCode)loadCloudData()">☁️ ક્લાઉડ સાથે સિંક થયેલ છે &nbsp;🔄</div>

<div id="app">
  <div class="skeleton"></div>
  <div class="skeleton" style="height:200px;margin-top:0"></div>
</div>

<div class="footer">My Daily Report © 2026 | Cloud: Google Drive | Devendra Ramanuj 9276505035</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwFKmZ6vaXw40X54BwONQtSWSSfEUuz3c7HYJtEhYxGcvDR-Zaa6cufrwdALgFPn9GbVA/exec";
const ADMIN_PASSWORD  = "Dev@1";

if(localStorage.getItem("anganwadi_center_code") === "undefined" || localStorage.getItem("anganwadi_center_code") === null) {
  localStorage.clear();
}

const ITEMS = Object.freeze([
  {id:"ghau",    name:"ઘઉં",     emoji:"🌾", bg:"#fff3cd", color:"#856404"},
  {id:"chokha",  name:"ચોખા",    emoji:"🍚", bg:"#d1e7dd", color:"#0a3622"},
  {id:"tel",     name:"તેલ",     emoji:"🫙", bg:"#ffe0b2", color:"#e65100"},
  {id:"chana",   name:"ચણા",     emoji:"🫘", bg:"#e8d5f5", color:"#5b21b6"},
  {id:"dal",     name:"દાળ",     emoji:"🥣", bg:"#fce4ec", color:"#880e4f"},
  {id:"chanadal",name:"ચણાદાળ", emoji:"🫛", bg:"#e0f2fe", color:"#01579b"}
]);
const DAYS_SHORT  = ["ર","સો","મં","બુ","ગુ","શુ","શ"];
const DAYS_TBL    = ["રવિ","સોમ","મંગળ","બુધ","ગુッシュ","શનિ"];
const DAYS_FULL   = ["રવિવાર","સોમવાર","મંગળવાર","બુધવાર","ગુરુવાર","શુક્રવાર","શનિવાર"];
const MONTHS_FULL = ["જาน્યુઆરી","ફેબ્રુઆરી","માર્ચ","એપ્રિલ","મે","જૂન","જુલાઈ","ઓગસ્ટ","સપ્ટેમ્બર","ઓક્ટોબર","નવેમ્બર","ડિસેમ્બર"];
const DEFAULT_INV = {ghau:{o:500,r:200},chokha:{o:300,r:100},tel:{o:50,r:20},chana:{o:80,r:30},dal:{o:80,r:30},chanadal:{o:80,r:30}};

let centerCode = localStorage.getItem("anganwadi_center_code") || "";
let state = {
  inv: JSON.parse(JSON.stringify(DEFAULT_INV)),
  ben: {},
  tab:0,
  calY: new Date().getFullYear(),
  calM: new Date().getMonth(),
  modal:null, modalVal:"", rptTab:"daily",
  adminUnlocked:false, logData:[], logFilter:{center:"",action:"",date:""},
  adminTab:"logs",
  con:{ loading:false, error:"", centers:[], selY:new Date().getFullYear(), selM:new Date().getMonth() }
};

let _saveTimer = null;
function scheduleSave(){ clearTimeout(_saveTimer); _saveTimer = setTimeout(saveState, 800); }

function bootApp(){
  loadLocalFallback();
  if(!centerCode){ render(); return; }
  showNav();
  showHeaderInfo();
  render();
  setTimeout(syncCloud, 500);
}

function loadLocalFallback(){
  if(!centerCode) return;
  const raw = localStorage.getItem("mdr_offline_" + centerCode);
  if(!raw) return;
  try{
    const d = JSON.parse(raw);
    if(d.inv) state.inv = d.inv;
    if(d.ben) state.ben = d.ben;
  }catch(_){}
}

async function syncCloud(){
  if(!_hasURL || !centerCode){ return; }
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?centerCode=${encodeURIComponent(centerCode)}`);
    const data = await res.json();
    if(data && data.status !== "new_user" && data.status !== "error"){
      if(data.inv) state.inv = data.inv;
      if(data.ben) state.ben = data.ben;
      localStorage.setItem("mdr_offline_" + centerCode, JSON.stringify({inv:state.inv, ben:state.ben}));
      render();
    }
  } catch(e) {}
}

async function loadCloudData(){ await syncCloud(); }

async function saveState(){
  if(!centerCode) return;
  localStorage.setItem("mdr_offline_" + centerCode, JSON.stringify({inv:state.inv, ben:state.ben}));
  if(!_hasURL) return;
  try{
    fetch(APPS_SCRIPT_URL,{
      method:"POST",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({centerCode, data:{inv:state.inv, ben:state.ben}})
    });
  }catch(e){}
}

function showNav(){
  const nav = document.getElementById("nav");
  const ss = document.getElementById("syncStatus");
  if(nav) nav.style.display = "flex";
  if(ss) ss.style.display = "block";
}
function showHeaderInfo(){
  const bar = document.getElementById("centerInfoBar");
  const btn = document.getElementById("btnLogoutHeader");
  if(bar && centerCode){ bar.style.display="block"; bar.innerHTML=`🏢 કेन्द्र: <b style="color:#f39c12">${centerCode}</b>`; }
  if(btn) btn.style.display = "block";
}

async function fetchLogs(){
  if(!_hasURL) return;
  try{
    const res  = await fetch(`${APPS_SCRIPT_URL}?action=getLogs`);
    const data = await res.json();
    state.logData = data.logs || [];
  }catch(_){}
  render();
}

async function fetchAllCenters(){
  state.con.loading = true; render();
  try{
    const res  = await fetch(`${APPS_SCRIPT_URL}?action=getAllCenters`);
    const data = await res.json();
    if(data.status==="ok") state.con.centers = data.centers || [];
  }catch(e){}
  state.con.loading = false; render();
}

const _hasURL = APPS_SCRIPT_URL && !APPS_SCRIPT_URL.includes("YOUR_URL");
const fmt = (n,d=0) => (n==null||isNaN(n)) ? "0" : Number(n).toFixed(d);

function renderSetupPage(){
  return `<div class="setup-box">
    <h2>🏢 આંગણવાડી કેન્દ્ર લોગિન</h2>
    <p style="font-size:13px;color:#64748b;margin-bottom:15px">કેન્દ્રનો કોડ અથવા મોબાઈલ નંબર નાખો.</p>
    <input type="text" id="centerCodeInput" placeholder="દા.ત. AW-101" value="" autocomplete="off">
    <button id="btnSubmitSetup">એપ શરૂ કરો ➔</button>
  </div>`;
}

function renderInventoryPage(curMU){
  const cards = ITEMS.map(it=>{
    const iv = state.inv[it.id] || {o:0, r:0};
    const opening = iv.o + iv.r;
    const used    = ((curMU && curMU[it.id]) || 0) / 1000;
    return `<div class="inv-card">
      <div class="inv-title" style="background:${it.bg};color:${it.color}">${it.emoji} ${it.name}</div>
      <div class="inv-row"><label>ઊઘડતી:</label><input type="number" step="0.001" data-inv="${it.id}" data-field="o" value="${iv.o}"></div>
      <div class="inv-row"><label>આવક:</label><input type="number" step="0.001" data-inv="${it.id}" data-field="r" value="${iv.r}"></div>
      <div class="inv-stat">કુલ: <b>${fmt(opening,3)}</b> kg | બાકી: <b>${fmt(opening-used,3)}</b> kg</div>
    </div>`;
  }).join("");
  return `<div class="container tab-content"><div class="card"><div class="section-head">📦 ઈન્વેન્ટરી</div><div class="section-body"><div class="inv-grid">${cards}</div></div></div></div>`;
}

/* ✅ કમ્પ્લીટ એડમિન પેનલ લોજિક અને યુઆઈ પાછું એડ કર્યું */
function renderAdminPage(){
  if(!state.adminUnlocked){
    return `<div class="container"><div class="card">
      <div class="section-head" style="background:linear-gradient(135deg,#3b0764,#5b21b6)">🛡️ Admin Panel</div>
      <div class="admin-gate"><div class="admin-gate-box">
        <div style="font-size:48px;margin-bottom:10px">🛡️</div>
        <h2>Admin Access</h2>
        <p>Admin password દાખલ કરો</p>
        <input id="adminPwdInput" type="password" class="admin-pwd-input" placeholder="• • • •" maxlength="30">
        <div id="adminPwdErr" class="admin-err"></div>
        <button class="admin-pwd-btn" id="adminPwdBtn">🔓 Unlock</button>
      </div></div>
    </div></div>`;
  }

  const logs=state.logData||[];
  const uniqueCenters=[...new Set(logs.map(l=>l.centerCode).filter(Boolean))];
  const isLogs = state.adminTab === "logs";
  const tableRows = logs.slice(-20).reverse().map(l => `<tr><td>${l.centerCode || "—"}</td><td><span class="log-badge log-${l.action||"SAVE"}">${l.action||"—"}</span></td><td>${l.details||"—"}</td></tr>`).join("");

  return `<div class="container tab-content"><div class="card">
    <div class="section-head" style="background:linear-gradient(135deg,#3b0764,#5b21b6)">
      🛡️ Admin Panel
      <button id="btnAdminLock" style="background:rgba(255,255,255,.2);color:#fff;border:none;padding:4px 10px;border-radius:6px;cursor:pointer">🔒 Lock</button>
    </div>
    <div class="stat-cards">
      <div class="stat-card"><div class="s-num">${uniqueCenters.length}</div><div class="s-lbl">🏢 કુલ કેન્દ્ર</div></div>
      <div class="stat-card"><div class="s-num">${logs.length}</div><div class="s-lbl">📋 Total Logs</div></div>
    </div>
    <div class="admin-tabs">
      <button class="admin-tab-btn ${isLogs?'active':''}" id="adminTabLogs">📋 Log Viewer</button>
      <button class="admin-tab-btn ${!isLogs?'active':''}" id="adminTabCon">📊 એકત્રીકરણ</button>
    </div>
    ${isLogs ? `
      <div class="log-filter"><button id="btnRefreshLogs">🔄 Refresh Logs</button></div>
      <div class="log-table-wrap"><table class="log-table">
        <thead><tr><th>🏢 Center</th><th>⚡ Action</th><th>📝 વિગત</th></tr></thead>
        <tbody>${tableRows || "<tr><td colspan='3' style='text-align:center;padding:10px;'>કોઈ લોગ ઉપલબ્ધ નથી</td></tr>"}</tbody>
      </table></div>
    ` : buildConsolidationHTML()}
  </div></div>`;
}

function buildConsolidationHTML(){
  const con = state.con;
  const toolbar = `<div class='con-toolbar'><button id='btnFetchCenters'>🔄 Load Center Matrix</button></div>`;
  if(con.loading) return toolbar + "<div class='con-loading'>ડેટા લોડ થઈ રહ્યો છે...</div>";
  if(!con.centers || !con.centers.length) return toolbar + "<div class='con-loading' style='color:#64748b;padding:15px;'>કોઈ કેન્ટ્રલ મેટ્રિક્સ ડેટા નથી</div>";

  const dataRows = con.centers.map(c => `<tr><td class='con-c1'>${c.centerCode}</td><td>—</td><td>—</td></tr>`).join("");
  return toolbar + `<div class='con-table-wrap'><table class='con-table'><thead><tr><th class='con-c1'>કેન્દ્ર</th><th>દિ.</th><th>કુલ લાભાર્થી</th></tr></thead><tbody>${dataRows}</tbody></table></div>`;
}

function calcMonthUsage(y,m,ben){ return {totalN:0,days:0}; }
function renderCalendarPage(){ return `<div class="container tab-content"><div class="card"><div class="section-head">📅 કેલેન્ડર</div><div class="section-body">લોકલ બેકઅપ રનિંગ...</div></div></div>`; }
var renderMonthlyPage = renderCalendarPage, renderReportPage = renderCalendarPage;

/* ============================================================
   MAIN RENDER
============================================================ */
let _renderPending = false;
function render(){
  if(_renderPending) return;
  _renderPending = true;
  requestAnimationFrame(()=>{
    _renderPending = false;
    const app = document.getElementById('app');
    if(!app) return;
    
    try {
      if(!centerCode || centerCode === "undefined"){
        document.getElementById("nav").style.display = "none";
        document.getElementById("syncStatus").style.display = "none";
        app.innerHTML = renderSetupPage();
        return;
      }
      
      showNav();
      document.querySelectorAll('#nav button').forEach(b=>{
        if(b && b.dataset) b.classList.toggle('active', Number(b.dataset.tab) === state.tab);
      });

      let html="";
      if(state.tab===0)      html=renderInventoryPage(null);
      else if(state.tab===1) html=renderCalendarPage();
      else if(state.tab===2) html=renderMonthlyPage();
      else if(state.tab===3) html=renderReportPage();
      else if(state.tab===4) html=renderAdminPage();
      
      app.innerHTML = html;
    } catch(err) {
      app.innerHTML = `<div class='setup-box'><h2>⚠️ લોડિંગ એરર</h2><button onclick='localStorage.clear(); location.reload();'>રીસેટ</button></div>`;
    }
  });
}

/* ============================================================
   EVENT DELEGATION (Admin બટનો સાથે)
============================================================ */
document.addEventListener('click', e=>{
  const t=e.target;
  if(!t) return;
  if(t.id==='btnSubmitSetup'){
    const val=document.getElementById("centerCodeInput").value.trim();
    if(!val){alert("⚠️ કોડ નાખો!");return;}
    centerCode=val;
    localStorage.setItem("anganwadi_center_code",centerCode);
    bootApp();
    return;
  }
  if(t.id==='adminPwdBtn'){
    const inp=document.getElementById("adminPwdInput");
    if(inp && inp.value===ADMIN_PASSWORD){ state.adminUnlocked=true; fetchLogs(); }
    else { const err=document.getElementById("adminPwdErr"); if(err) err.textContent="❌ પાસવર્ડ ખોટો!"; }
    return;
  }
  if(t.id==='btnAdminLock'){ state.adminUnlocked=false; render(); return; }
  if(t.id==='btnRefreshLogs'){ fetchLogs(); return; }
  if(t.id==='adminTabLogs'){ state.adminTab="logs"; render(); return; }
  if(t.id==='adminTabCon'){ state.adminTab="consolidation"; render(); if(!state.con.centers.length) fetchAllCenters(); return; }
  if(t.id==='btnFetchCenters'){ fetchAllCenters(); return; }
  if(t.matches('#nav button')){ state.tab=Number(t.dataset.tab); render(); return; }
});
bootApp();
</script>

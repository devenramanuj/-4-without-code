<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Daily Report</title>
<!-- ✅ FIX 1: font-display:swap + preload = no blocking -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;700&display=swap">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;700&display=swap" rel="stylesheet"></noscript>
<style>
/* ✅ FIX 2: System font stack FIRST — UI shows instantly before Noto loads */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans Gujarati',system-ui,-apple-system,'Segoe UI',sans-serif;
  background:#f0f4f8;color:#1a2535;line-height:1.4;
  font-display:swap
}

.container{max-width:1200px;margin:0 auto;padding:10px}
.header{background:linear-gradient(135deg,#0f2442,#1a3c5e);color:#fff;padding:12px;position:sticky;top:0;z-index:100;box-shadow:0 3px 10px rgba(0,0,0,.3)}
.header h1{font-size:18px;text-align:center;margin-bottom:8px}
.nav{display:flex;gap:4px;justify-content:center;flex-wrap:wrap}
.nav button{background:transparent;color:#cfd8e3;border:none;padding:8px 12px;font-size:13px;font-family:inherit;cursor:pointer;border-bottom:3px solid transparent;font-weight:600}
.nav button.active{color:#f39c12;border-bottom-color:#f39c12}
.card{background:#fff;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.08);margin-bottom:12px;border:1px solid #d1dce8;overflow:hidden}
.section-head{background:linear-gradient(135deg,#1a3c5e,#2563a8);color:#fff;padding:10px 14px;font-weight:700;font-size:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.section-body{padding:12px}

.skeleton{background:linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:8px;height:120px;margin:12px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.inv-card{border:1px solid #d1dce8;border-radius:10px;padding:10px;background:#fafcff}
.inv-title{font-weight:700;font-size:13px;margin-bottom:6px;padding:4px 8px;border-radius:14px;display:inline-block}
.inv-row{display:flex;justify-content:space-between;align-items:center;margin:4px 0;font-size:12px}
.inv-row label{color:#475569;font-weight:600}
.inv-row input{width:75px;padding:4px 6px;border:1px solid #cbd5e1;border-radius:6px;font-family:inherit;text-align:right;font-size:12px}
.inv-stat{font-size:11px;color:#64748b;margin-top:6px;padding-top:6px;border-top:1px dashed #d1dce8}
.inv-stat b{color:#2563a8}
.cal-head{display:flex;justify-content:space-between;align-items:center;padding:8px;gap:6px}
.cal-head button{background:#2563a8;color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700}
.cal-head h3{font-size:15px;font-weight:700;color:#1a3c5e}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:4px;box-sizing:border-box;width:100%}
.cal-day-head{text-align:center;font-weight:700;font-size:11px;padding:5px 1px;background:#1a3c5e;color:#fff;border-radius:4px;box-sizing:border-box;overflow:hidden}
.cal-day-head.sun{background:#cc3d3d}
.cal-cell{aspect-ratio:1;border:1px solid #d1dce8;border-radius:6px;padding:2px;cursor:pointer;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;font-size:11px;transition:all .15s;min-height:44px;position:relative;box-sizing:border-box;overflow:hidden}
.cal-cell:hover{background:#e0f2fe;border-color:#2563a8}
.cal-cell.empty{background:transparent;border:none;cursor:default}
.cal-cell.today{background:#fef3c7;border-color:#f59e0b;border-width:2px}
.cal-cell .d{font-weight:700;font-size:12px;color:#1a3c5e}
.cal-cell.sunday .d{color:#cc3d3d}
.cal-cell .n{font-weight:800;font-size:14px;color:#1b8f57;margin-top:2px}
.cal-cell .n.zero{color:#cbd5e1;font-size:10px}
.cal-totals{display:flex;justify-content:space-around;background:#eef5fb;padding:8px;flex-wrap:wrap;gap:6px;border-top:1px solid #d1dce8}
.cal-totals div{font-size:12px;text-align:center}
.cal-totals b{color:#2563a8;display:block;font-size:14px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:500;padding:14px}
.modal{background:#fff;border-radius:14px;padding:18px;max-width:340px;width:100%;box-shadow:0 10px 30px rgba(0,0,0,.3)}
.modal h3{margin-bottom:10px;color:#1a3c5e;font-size:16px}
.modal input{width:100%;padding:10px;border:2px solid #cbd5e1;border-radius:8px;font-family:inherit;font-size:18px;text-align:center;font-weight:700;margin-bottom:12px}
.modal input:focus{outline:none;border-color:#2563a8}
.modal-btns{display:flex;gap:8px}
.modal-btns button{flex:1;padding:10px;border:none;border-radius:8px;font-family:inherit;font-weight:700;cursor:pointer;font-size:14px}
.btn-save{background:#1b8f57;color:#fff}
.btn-cancel{background:#e2e8f0;color:#475569}
.btn-clear{background:#cc3d3d;color:#fff}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{border-collapse:separate;border-spacing:0;width:100%;font-size:11px}
th{background:#1a3c5e;color:#fff;padding:8px 6px;text-align:center;border:1px solid rgba(255,255,255,.15);font-weight:700;font-size:11px;white-space:nowrap;position:sticky;top:0;z-index:2}
td{padding:6px;text-align:center;border:1px solid #d1dce8;background:#fff;white-space:nowrap}
tr:nth-child(even) td{background:#f8fafc}
.sticky-c1{position:sticky;left:0;z-index:3;box-shadow:none;width:32px;min-width:32px;max-width:32px}
.sticky-c2{position:sticky;left:32px;z-index:3;white-space:nowrap;width:auto;padding-left:6px;padding-right:6px}
.sticky-c3{position:sticky;left:calc(32px + var(--c2w, 52px));z-index:3;width:32px;min-width:32px;max-width:32px;box-shadow:2px 0 4px rgba(0,0,0,.08)}
th.sticky-c1,th.sticky-c2,th.sticky-c3{z-index:5;background:#1a3c5e}
td.sticky-c1,td.sticky-c2,td.sticky-c3{background:#fff}
tr:nth-child(even) td.sticky-c1,tr:nth-child(even) td.sticky-c2,tr:nth-child(even) td.sticky-c3{background:#f8fafc}
tr.sun-row td{background:#fff0f0 !important;color:#991b1b}
tr.sun-row td.sticky-c1,tr.sun-row td.sticky-c2,tr.sun-row td.sticky-c3{background:#fff0f0 !important;color:#991b1b;font-weight:700}
.total-row td{background:#fef3c7 !important;font-weight:800;color:#92400e;border-top:2px solid #f59e0b}
.total-row td.sticky-c1,.total-row td.sticky-c2,.total-row td.sticky-c3{background:#fef3c7 !important;color:#92400e}
.report-tabs{display:flex;gap:6px;padding:8px;background:#eef5fb;border-bottom:1px solid #d1dce8}
.report-tabs button{flex:1;padding:8px;border:none;background:#fff;color:#475569;border-radius:6px;font-family:inherit;font-weight:700;cursor:pointer;font-size:13px;border:1px solid #d1dce8}
.report-tabs button.active{background:#2563a8;color:#fff;border-color:#2563a8}
.actions{display:flex;gap:6px;flex-wrap:wrap;padding:10px;background:#f8fafc;border-top:1px solid #d1dce8}
.actions button{padding:7px 12px;border:none;border-radius:6px;font-family:inherit;font-weight:700;cursor:pointer;font-size:12px;color:#fff}
.btn-print{background:#475569}
.btn-share{background:#1b8f57}
.badge{padding:3px 8px;border-radius:12px;font-size:10px;font-weight:700;display:inline-block}
.footer{text-align:center;padding:12px;color:#64748b;font-size:11px}
.logout-btn{background:rgba(204,61,61,.85);color:#fff;border:none;padding:5px 12px;border-radius:6px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .15s}
.logout-btn:hover{background:#cc3d3d}
.sync-status{text-align:center;padding:4px 8px;font-size:11px;font-weight:600;color:#1b8f57;background:#e8f5e9;transition:all .3s;cursor:pointer}
.setup-box{max-width:400px;margin:50px auto;padding:20px;background:#fff;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.1);border:1px solid #d1dce8;text-align:center}
.setup-box h2{color:#1a3c5e;margin-bottom:15px;font-size:18px}
.setup-box input{width:100%;padding:10px;font-size:16px;text-align:center;border:2px solid #cbd5e1;border-radius:8px;margin-bottom:15px;font-family:inherit;font-weight:700}
.setup-box button{background:#2563a8;color:#fff;border:none;padding:10px 20px;font-size:14px;font-weight:700;border-radius:8px;cursor:pointer;width:100%;font-family:inherit}
.admin-gate{display:flex;align-items:center;justify-content:center;padding:40px 16px}
.admin-gate-box{text-align:center;max-width:280px;width:100%}
.admin-gate-box h2{color:#5b21b6;font-size:16px;margin-bottom:6px}
.admin-pwd-input{width:100%;padding:10px;border:2px solid #d1dce8;border-radius:8px;font-size:18px;text-align:center;font-family:inherit;letter-spacing:4px;margin-bottom:8px;transition:border-color .2s}
.admin-pwd-input:focus{outline:none;border-color:#7c3aed}
.admin-pwd-btn{width:100%;padding:10px;background:linear-gradient(135deg,#5b21b6,#7c3aed);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer}
.admin-err{color:#cc3d3d;font-size:12px;min-height:16px;margin-bottom:10px}
.zoom-toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f0f7ff;border-bottom:1px solid #d1dce8;flex-wrap:wrap}
.zoom-toolbar label{font-size:12px;font-weight:700;color:#1a3c5e;white-space:nowrap}
.zoom-slider{flex:1;min-width:100px;max-width:220px;accent-color:#2563a8;cursor:pointer;height:4px}
.zoom-pct{font-size:12px;font-weight:800;color:#2563a8;min-width:38px;text-align:right}
.zoom-btn{background:#2563a8;color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:14px;font-weight:700;cursor:pointer;line-height:1;flex-shrink:0}
.zoom-reset{background:#e2e8f0;color:#475569;border:none;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0}
.zoomable-outer{overflow:auto;-webkit-overflow-scrolling:touch;width:100%}
.zoomable-inner{display:block;min-width:100%;zoom:1}
@media print{
  .header,.actions,.nav,.report-tabs,.cal-head button,.sync-status{display:none !important}
  body{background:#fff}
  .card{box-shadow:none;border:1px solid #000}
}
@media (max-width:600px){
  .header h1{font-size:15px}
  .nav button{padding:6px 8px;font-size:11px}
  .inv-grid{grid-template-columns:repeat(2,1fr)}
  .cal-cell{min-height:42px;font-size:10px}
  table{font-size:10px}
}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
    <h1 style="font-size:16px;margin:0;flex:1;text-align:center">🌾 My Daily Report</h1>
    <button class="logout-btn" id="btnLogoutHeader" style="display:none">🚪 Logout</button>
  </div>
  <div id="centerInfoBar" style="display:none;text-align:center;font-size:11px;color:#a0b4c8;margin-bottom:4px"></div>
  <div class="nav" id="nav" style="display:none;">
    <button data-tab="0" class="active">📦 ઈન્વેન્ટરી</button>
    <button data-tab="1">📅 કેલેન્ડર</button>
    <button data-tab="2">📊 માસિક</button>
    <button data-tab="3">📋 રિપોર્ટ</button>
    <button data-tab="4">💰 બિલ</button>
    <button data-tab="5">🛡️ Admin</button>
  </div>
</div>

<div id="syncStatus" class="sync-status" style="display:none;cursor:pointer" onclick="if(centerCode)loadCloudData()">☁️ ક્લાઉડ સાથે સિંક થયેલ છે &nbsp;🔄</div>

<div id="app">
  <div class="skeleton"></div>
  <div class="skeleton" style="height:200px;margin-top:0"></div>
</div>

<div class="footer">My Daily Report © 2026 | Cloud: Google Drive | Devendra Ramanuj 9276505035</div>

<script>
/* ============================================================
   CONFIG
============================================================ */
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw50LCilmreN1FtjZw7BDXkHJ0-4qhUeAAOcTuhf8muvr29a-NV2Y0_9ZzaViv0CQbWow/exec";
const ADMIN_PASSWORD = "Dev@1";

/* ============================================================
   CONSTANTS
============================================================ */
const ITEMS = Object.freeze([
  {id:"ghau",    name:"ઘઉં",     emoji:"🌾", bg:"#fff3cd", color:"#856404"},
  {id:"chokha",  name:"ચોખા",    emoji:"🍚", bg:"#d1e7dd", color:"#0a3622"},
  {id:"tel",     name:"તેલ",     emoji:"🫙", bg:"#ffe0b2", color:"#e65100"},
  {id:"chana",   name:"ચણા",     emoji:"🫘", bg:"#e8d5f5", color:"#5b21b6"},
  {id:"dal",     name:"દાળ",     emoji:"🥣", bg:"#fce4ec", color:"#880e4f"},
  {id:"chanadal",name:"ચણાદાળ", emoji:"🫛", bg:"#e0f2fe", color:"#01579b"}
]);
const DAYS_SHORT  = ["ર","સો","મં","બુ","ગુ","શુ","શ"];
const DAYS_TBL    = ["રવિ","સોમ","મંગળ","બુધ","ગુ","શુ","શ"];
const DAYS_FULL   = ["રવિવાર","સોમવાર","મંગળવાર","બુધવાર","ગુરુવાર","શુક્રવાર","શનિવાર"];
const MONTHS_FULL = ["જાન્યુઆરી","ફેબ્રուઆરી","માર્ચ","એપ્રિલ","મે","જૂન","જુલાઈ","ઓગસ્ટ","સપ્ટેમ્બર","ઓક્ટોબર","નવેમ્બર","ડિસેમ્બર"];
const DEFAULT_INV = {ghau:{o:500,r:200},chokha:{o:300,r:100},tel:{o:50,r:20},chana:{o:80,r:30},dal:{o:80,r:30},chanadal:{o:80,r:30}};

/* ============================================================
   STATE
============================================================ */
let centerCode = localStorage.getItem("anganwadi_center_code") || "";
let state = {
  inv: JSON.parse(JSON.stringify(DEFAULT_INV)),
  ben: {},
  tab:0,
  calY: new Date().getFullYear(),
  calM: new Date().getMonth(),
  modal:null, modalVal:"", rptTab:"daily",
  adminUnlocked:false, allCentersData:[]
};

let _saveTimer = null;
function scheduleSave(){ clearTimeout(_saveTimer); _saveTimer = setTimeout(saveState, 800); }

function setStatus(msg, color="#1b8f57"){
  const s = document.getElementById("syncStatus");
  if(!s) return;
  s.style.display  = "block";
  s.textContent    = msg;
  s.style.background = color === "#1b8f57" ? "#e8f5e9" : (color === "#cc3d3d" ? "#fee2e2" : "#fff3cd");
  s.style.color    = color;
}

function bootApp(){
  if(!centerCode){ render(); return; }
  loadLocalFallback();
  showNav();
  showHeaderInfo();
  render();
  setTimeout(syncCloud, 200);
}

function loadLocalFallback(){
  const raw = localStorage.getItem("mdr_offline_" + centerCode);
  if(!raw) return;
  try{
    const d = JSON.parse(raw);
    if(d.inv) state.inv = d.inv;
    if(d.ben) state.ben = d.ben;
  }catch(_){}
}

async function syncCloud(){
  if(!_hasURL){ setStatus("⚠️ Apps Script URL સેટ નથી — Offline mode","#e67e22"); return; }
  setStatus("⏳ Background sync...","#2563a8");
  try{
    const ctrl = new AbortController();
    const tid  = setTimeout(()=>ctrl.abort(), 12000);
    const res  = await fetch(`${APPS_SCRIPT_URL}?centerCode=${encodeURIComponent(centerCode)}`,{signal:ctrl.signal});
    clearTimeout(tid);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if(data && data.status !== "new_user" && data.status !== "error"){
      if(data.inv) state.inv = data.inv;
      if(data.ben) state.ben = data.ben;
      localStorage.setItem("mdr_offline_" + centerCode, JSON.stringify({inv:state.inv, ben:state.ben}));
      setStatus(`☁️ Synced — ${centerCode}`);
      render();
    } else if(data.status === "new_user"){
      setStatus(`🆕 નવું કેન્દ્ર: ${centerCode}`);
    } else {
      throw new Error(data.msg || "unknown");
    }
  }catch(e){
    setStatus(`⚠️ Offline mode`, "#e67e22");
  }
}

async function loadCloudData(){ await syncCloud(); }

async function saveState(){
  if(!centerCode) return;
  localStorage.setItem("mdr_offline_" + centerCode, JSON.stringify({inv:state.inv, ben:state.ben}));
  if(!_hasURL){ setStatus("💾 Local save OK","#e67e22"); return; }
  try{
    const ctrl = new AbortController();
    const tid  = setTimeout(()=>ctrl.abort(), 12000);
    await fetch(APPS_SCRIPT_URL,{
      method:"POST",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({centerCode, data:{inv:state.inv, ben:state.ben}}),
      signal: ctrl.signal
    });
    clearTimeout(tid);
    setStatus(`✅ Cloud + Local — સેવ!`);
  }catch(e){
    setStatus(`⚠️ Local backup OK`,"#e67e22");
  }
}

function showNav(){
  document.getElementById("nav").style.display = "flex";
  document.getElementById("syncStatus").style.display = "block";
}
function showHeaderInfo(){
  const bar = document.getElementById("centerInfoBar");
  const btn = document.getElementById("btnLogoutHeader");
  if(bar && centerCode){ bar.style.display="block"; bar.innerHTML=`🏢 કेन्द्र: <b style="color:#f39c12">${centerCode}</b>`; }
  if(btn) btn.style.display = "block";
}

/* ============================================================
   USAGE RULES
============================================================ */
function calcUsage(dow, n) {
  n = Number(n) || 0;
  const u = {};
  ITEMS.forEach(it => { u[it.id] = 0; u[it.id+"M"] = 0; u[it.id+"A"] = 0; u[it.id+"nM"] = 0; u[it.id+"nA"] = 0; });
  if (!n || dow === 0) return u;

  u.telM = 5 * n; u.telnM = n;
  if ([1, 3, 4, 5, 6].includes(dow)) { u.ghauM = 30 * n; u.ghaunM = n; }
  if (dow === 2) { u.chokhaM = 30 * n; u.chokhanM = n; }

  u.telA = 8 * n; u.telnA = n;
  if ([1, 2, 5].includes(dow)) { u.ghauA = 50 * n; u.ghaunA = n; }
  if ([3, 4, 6].includes(dow)) { u.chokhaA = 50 * n; u.chokhanA = n; }
  if ([2, 4, 5].includes(dow)) { u.chanaA = 20 * n; u.chananA = n; }
  if ([1, 3].includes(dow)) { u.dalA = 20 * n; u.dalnA = n; }
  if (dow === 6) { u.chanadalA = 20 * n; u.chanadalnA = n; }

  ITEMS.forEach(it => { u[it.id] = u[it.id + "M"] + u[it.id + "A"]; });
  return u;
}

function dayHint(d) {
  const h = ["🔴 રવિ — બંધ","સ:ઘઉ30+તે5 | બ:ઘઉ50+દા20+તે8","સ:ચો30+તે5 | બ:ઘઉ50+ચ20+તે8","સ:ઘઉ30+તે5 | બ:ચો50+દા20+તે8","સ:ઘઉ30+તે5 | બ:ચો50+ચ20+તે8","સ:ઘઉ30+તે5 | બ:ઘઉ50+ચ20+તે8","સ:ઘઉ30+તે5 | બ:ચો50+ચદ20+તે8"];
  return h[d] || "";
}

const dkf = (y, m, d) => `${y}-${String(m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
let _muCache = null, _muCacheKey = "";

function calcMonthUsage(y, m, ben) {
  const key = `${y}-${m}-${JSON.stringify(ben)}`;
  if (_muCache && _muCacheKey === key) return _muCache;

  const total = { totalN: 0, days: 0 };
  ITEMS.forEach(it => { total[it.id] = 0; total[it.id+"M"] = 0; total[it.id+"A"] = 0; total[it.id+"nM"] = 0; total[it.id+"nA"] = 0; });
  const dim = new Date(y, m + 1, 0).getDate();
  
  for (let d = 1; d <= dim; d++) {
    const dateStr = dkf(y, m, d);
    const n = Number(ben[dateStr] || 0);
    if (!n) continue;
    const u = calcUsage(new Date(y, m, d).getDay(), n);
    ITEMS.forEach(it => { total[it.id] += u[it.id]; total[it.id+"M"] += u[it.id+"M"]; total[it.id+"A"] += u[it.id+"A"]; total[it.id+"nM"] += u[it.id+"nM"]; total[it.id+"nA"] += u[it.id+"nA"]; });
    total.totalN += n; total.days++;
  }
  _muCache = total; _muCacheKey = key; return total;
}
function invalidateCache() { _muCache = null; _muCacheKey = ""; }
const fmt = (n, d = 0) => (n == null || isNaN(n)) ? "0" : Number(n).toFixed(d);

/* ============================================================
   RENDER — PAGES
============================================================ */
function renderSetupPage(){
  return `<div class="setup-box"><h2>🏢 આંગણવાડી કેન્દ્ર લોગિન</h2><input type="text" id="centerCodeInput" placeholder="કેન્દ્ર કોડ દાખલ કરો" value="${centerCode}"><button id="btnSubmitSetup">શરૂ કરો ➔</button></div>`;
}

function renderInventoryPage(curMU){
  const cards = ITEMS.map(it=>{
    const iv = state.inv[it.id]; const opening = iv.o + iv.r; const used = (curMU[it.id] || 0) / 1000;
    return `<div class="inv-card"><div class="inv-title" style="background:${it.bg};color:${it.color}">${it.emoji} ${it.name}</div><div class="inv-row"><label>ઊઘડતી:</label><input type="number" step="0.001" data-inv="${it.id}" data-field="o" value="${iv.o}"></div><div class="inv-row"><label>આવક:</label><input type="number" step="0.001" data-inv="${it.id}" data-field="r" value="${iv.r}"></div><div class="inv-stat">કુલ સિલક: <b>${fmt(opening,3)}</b> kg<br>વપરાશ: <b>${fmt(used,3)}</b> kg<br>બંધ સિલક: <b>${fmt(opening-used,3)}</b> kg</div></div>`;
  }).join("");
  return `<div class="container tab-content"><div class="card"><div class="section-head">📦 ઈન્વેન્ટરી (${MONTHS_FULL[state.calM]} ${state.calY})</div><div class="section-body"><div class="inv-grid">${cards}</div></div></div></div>`;
}

function renderCalendarPage(){
  const y=state.calY, m=state.calM; const first=new Date(y,m,1).getDay(); const dim=new Date(y,m+1,0).getDate();
  let cells="", monthN=0, monthD=0;
  for(let i=0;i<first;i++) cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=dim;d++){
    const n=Number(state.ben[dkf(y,m,d)]||0); if(n>0){monthN+=n;monthD++;}
    cells+=`<div class="cal-cell ${new Date(y,m,d).getDay()===0?'sunday':''}" data-day="${d}"><div class="d">${d}</div><div class="n ${n===0?'zero':''}">${n>0?n:'—'}</div></div>`;
  }
  return `<div class="container tab-content"><div class="card"><div class="section-head">📅 કેલેન્ડર</div><div class="cal-head"><button id="prevM">‹</button><h3>${MONTHS_FULL[m]} ${y}</h3><button id="nextM">›</button></div><div class="cal-grid">${DAYS_SHORT.map((d,i)=>`<div class="cal-day-head ${i===0?'sun':''}">${d}</div>`).join("")}${cells}</div></div></div>`;
}

function renderMonthlyPage(curMU){
  const rows = ITEMS.map(it=>{
    return `<tr><td style="text-align:left">${it.emoji} ${it.name}</td><td><b>${curMU[it.id+"nM"]||0}</b></td><td><b>${curMU[it.id+"nA"]||0}</b></td><td>${fmt(state.inv[it.id].o+state.inv[it.id].r,3)}</td><td>${fmt(curMU[it.id+"M"]||0)}</td><td>${fmt(curMU[it.id+"A"]||0)}</td><td>${fmt(curMU[it.id]||0)}</td><td>${fmt((state.inv[it.id].o+state.inv[it.id].r)-(curMU[it.id]||0)/1000,3)}</td></tr>`;
  }).join("");
  return `<div class="container tab-content"><div class="card"><div class="section-head">📊 માસિક - ${MONTHS_FULL[state.calM]} ${state.calY}</div><div class="table-wrap"><table><thead><tr><th style="text-align:left">ઇન્વેન્ટરી</th><th>સવાર લાભ.</th><th>બપોર લાભ.</th><th>ઊઘડતી (kg)</th><th>સવાર (g)</th><th>બપોર (g)</th><th>કુલ વપરાશ (g)</th><th>બંધ (kg)</th></tr></thead><tbody>${rows}</tbody></table></div></div></div>`;
}

function renderReportPage(){
  const today=new Date(); const todayN=Number(state.ben[dkf(today.getFullYear(),today.getMonth(),today.getDate())||0]);
  const dim=new Date(state.calY,state.calM+1,0).getDate(); const dateRowsArr = [];
  const runBal={}; ITEMS.forEach(it=>{ runBal[it.id]=state.inv[it.id].o+state.inv[it.id].r; });
  
  for(let d=1;d<=dim;d++){
    const n=Number(state.ben[dkf(state.calY,state.calM,d)]||0); const dow=new Date(state.calY,state.calM,d).getDay(); const u=calcUsage(dow,n);
    const colsArr=[]; ITEMS.forEach(it=>{ runBal[it.id]-=(u[it.id]||0)/1000; colsArr.push(`<td>${u[it.id+"M"]||"—"}</td><td>${u[it.id+"A"]||"—"}</td><td>${u[it.id]||"—"}</td><td>${fmt(runBal[it.id],3)}</td>`); });
    dateRowsArr.push(`<tr class="${dow===0?'sun-row':''}"><td class="sticky-c1"><b>${d}</b></td><td class="sticky-c2">${DAYS_TBL[dow]}</td><td class="sticky-c3">${n||"—"}</td>${colsArr.join("")}</tr>`);
  }
  return `<div class="container tab-content"><div class="card"><div class="report-tabs"><button data-rpt="daily" class="${state.rptTab==='daily'?'active':''}">📅 દૈ.</button><button data-rpt="monthly" class="${state.rptTab==='monthly'?'active':''}">📊 માસ</button></div><div class="zoom-toolbar"><input type="range" class="zoom-slider" id="zoomSlider" min="30" max="120" value="70"><span class="zoom-pct" id="zoomPct">70%</span></div><div class="zoomable-outer" id="zoomOuter"><div class="zoomable-inner" id="zoomInner"><table style="min-width:1400px"><thead><tr><th class="sticky-c1" rowspan="2">તા.</th><th class="sticky-c2" rowspan="2">વાર</th><th class="sticky-c3" rowspan="2">સં.</th>${ITEMS.map(it=>`<th colspan="4" style="background:${it.color}">${it.emoji} ${it.name}</th>`).join("")}</tr><tr>${ITEMS.map(()=>`<th>સ.</th><th>બ.</th><th>કુલ</th><th>સિલક</th>`).join("")}</tr></thead><tbody>${dateRowsArr.join("")}</tbody></table></div></div></div></div>`;
}

/* ============================================================
   💰 બિલ પેજ — સાચા નિયમો મુજબ (૪૬૬ ફિક્સ)
============================================================ */
function renderBillPage(curMU) {
  const y = state.calY, m = state.calM; const dim = new Date(y, m + 1, 0).getDate();
  const totalBeneficiaries = curMU.totalN || 0; 
  let fruitBeneficiaries = 0;

  for (let d = 1; d <= dim; d++) {
    const k = dkf(y, m, d); const n = Number(state.ben[k] || 0);
    if (n && (new Date(y, m, d).getDay() === 1 || new Date(y, m, d).getDay() === 5)) { fruitBeneficiaries += n; }
  }

  const chanaN = curMU["chananA"] || 0; const dalN = curMU["dalnA"] || 0;   
  const chanaTuverBeneficiaries = chanaN + dalN; 

  const fruitBill = fruitBeneficiaries * 3.12; const garamNastoBill = totalBeneficiaries * 1.30;
  const chanaTuverBill = chanaTuverBeneficiaries * 1.60; const shakbhajiBill = totalBeneficiaries * 0.15;
  const masalaBill = totalBeneficiaries * 1.00; const vahatukBill = totalBeneficiaries * 0.05;
  const totalBillAmount = fruitBill + garamNastoBill + chanaTuverBill + shakbhajiBill + masalaBill + vahatukBill;

  return `<div class="container tab-content"><div class="card"><div class="section-head">💰 બિલ — ${MONTHS_FULL[m]} ${y}</div><div class="table-wrap" style="padding: 10px;"><table style="min-width:100%; font-size: 13px;"><thead><tr style="background:#1a3c5e;color:#fff;"><th style="padding:10px;text-align:left;">બિલ પ્રકાર</th><th style="padding:10px;">ગણતરી</th><th style="padding:10px;text-align:right;">રકમ (₹)</th></tr></thead><tbody>
  <tr><td style="text-align:left;padding:10px;">🍎 ફ્રુટ બિલ</td><td>સોમ+શુક્ર લા. = <b>${fruitBeneficiaries}</b></td><td style="text-align:right;font-weight:bold;color:#2563a8;">₹ ${fmt(fruitBill, 2)}</td></tr>
  <tr><td style="text-align:left;padding:10px;">🔥 ગરમ નાસ્તો બિલ</td><td>કુલ લાભાર્થી = <b>${totalBeneficiaries}</b></td><td style="text-align:right;font-weight:bold;color:#2563a8;">₹ ${fmt(garamNastoBill, 2)}</td></tr>
  <tr><td style="text-align:left;padding:10px;">🫘 ચણા + તુવેરદાળ બિલ</td><td>સંબંધિત લા. = <b>${chanaTuverBeneficiaries}</b></td><td style="text-align:right;font-weight:bold;color:#2563a8;">₹ ${fmt(chanaTuverBill, 2)}</td></tr>
  <tr><td style="text-align:left;padding:10px;">🥬 શાકભાજી બિલ</td><td>કુલ લાભાર્થી = <b>${totalBeneficiaries}</b></td><td style="text-align:right;font-weight:bold;color:#2563a8;">₹ ${fmt(shakbhajiBill, 2)}</td></tr>
  <tr><td style="text-align:left;padding:10px;">🧂 મસાલા બિલ</td><td>કુલ લાભાર્થી = <b>${totalBeneficiaries}</b></td><td style="text-align:right;font-weight:bold;color:#2563a8;">₹ ${fmt(masalaBill, 2)}</td></tr>
  <tr style="border-bottom:2px solid #1a3c5e;"><td style="text-align:left;padding:10px;">🚚 વાહતુક બિલ</td><td>કુલ લાભાર્થી = <b>${totalBeneficiaries}</b></td><td style="text-align:right;font-weight:bold;color:#2563a8;">₹ ${fmt(vahatukBill, 2)}</td></tr>
  <tr style="background:#fef3c7;font-weight:800;font-size:14px;color:#92400e;"><td colspan="2" style="text-align:right;padding:12px;">કુલ બિલ રકમ</td><td style="text-align:right;padding:12px;">₹ ${fmt(totalBillAmount, 2)}</td></tr></tbody></table></div><div class="actions"><button class="btn-print" id="btnPrint">🖨️ Print</button></div></div></div>`;
}

/* ============================================================
   🛡️ ADMIN PANEL — એકત્રીકરણ પત્રક સેક્શન સેટઅપ
============================================================ */
async function fetchAllCentersCloudData(){
  if(!_hasURL) return;
  setStatus("⏳ બધા કેન્દ્રોનો ડેટા લોડ થઈ રહ્યો છે...", "#2563a8");
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=getAllCenters`);
    const data = await res.json();
    state.allCentersData = Array.isArray(data) ? data : (data.result || []);
    setStatus(`✅ ડેટા અપડેટ થયો!`);
  } catch(e) {
    state.allCentersData = []; setStatus("❌ એકત્રીકરણ ફેચ નિષ્ફળ", "#cc3d3d");
  }
  render();
}

function renderAdminPage(){
  if(!state.adminUnlocked){
    return `<div class="container"><div class="card"><div class="section-head" style="background:linear-gradient(135deg,#3b0764,#5b21b6)">🛡️ Admin Panel</div><div class="admin-gate"><div class="admin-gate-box"><h2>Admin Access</h2><input id="adminPwdInput" type="password" class="admin-pwd-input" placeholder="• • • •"><div id="adminPwdErr" class="admin-err"></div><button class="admin-pwd-btn" id="adminPwdBtn">🔓 Unlock</button></div></div></div></div>`;
  }

  if (!state.allCentersData || state.allCentersData.length === 0) {
    return `<div class="container tab-content"><div class="card"><div class="section-head" style="background:linear-gradient(135deg,#3b0764,#5b21b6)">🛡️ Admin — એકત્રીકરણ</div><div style="padding:40px;text-align:center;color:#2563a8;">⏳ <b>બધા જ કેન્દ્રોનો લાઈવ ડેટા લોડ થઈ રહ્યો છે...</b></div></div></div>`;
  }

  const aggregationRows = state.allCentersData.map((c, index) => {
    const centerMU = calcMonthUsage(state.calY, state.calM, c.ben || {});
    const ghauClose = (c.inv?.ghau?.o || 0) + (c.inv?.ghau?.r || 0) - ((centerMU.ghau || 0) / 1000);
    const chokhaClose = (c.inv?.chokha?.o || 0) + (c.inv?.chokha?.r || 0) - ((centerMU.chokha || 0) / 1000);

    return `<tr><td><b>${index + 1}</b></td><td style="color:#5b21b6;font-weight:700;text-align:left;padding-left:10px;">🏢 ${c.centerCode || "Unknown"}</td><td><b>${centerMU.totalN || 0}</b></td><td style="color:#856404;">${fmt(ghauClose, 3)} kg</td><td style="color:#0a3622;">${fmt(chokhaClose, 3)} kg</td><td><span class="badge" style="background:#e0f2fe;color:#0369a1;">Synced</span></td></tr>`;
  }).join("");

  return `<div class="container tab-content"><div class="card"><div class="section-head" style="background:linear-gradient(135deg,#3b0764,#5b21b6)">🛡️ Admin Panel — એકત્રીકરણ પત્રક <button id="btnAdminLock">🔒 Lock</button></div><div style="padding: 12px;"><div style="display:flex;justify-content:space-between;margin-bottom:12px;"><h3>📊 કેન્દ્રોવાર માસિક વિગતો</h3><button class="btn-refresh" id="btnRefreshAdminData" style="padding:6px 12px;background:#1b8f57;color:#fff;border:none;border-radius:6px;cursor:pointer;">🔄 રિફ્રેશ</button></div><div class="table-wrap"><table style="width:100%;font-size:12px;min-width:600px;"><thead><tr style="background:#5b21b6;color:#fff;"><th>ક્રમ</th><th style="text-align:left;padding-left:10px;">કેન્દ્ર કોડ</th><th>કુલ લાભાર્થી</th><th>ઘઉં સિલક</th><th>ચોખા સિલક</th><th>સ્ટેટસ</th></tr></thead><tbody>${aggregationRows}</tbody></table></div></div></div></div>`;
}

function renderModal(){
  if(!state.modal) return "";
  return `<div class="modal-bg" id="modalBg"><div class="modal"><h3>📅 તારીખ ડેટા એન્ટ્રી</h3><input type="number" id="modalInput" value="${state.modalVal}" autofocus><div class="modal-btns"><button class="btn-cancel" id="modalCancel">રદ</button><button class="btn-clear" id="modalClear">સાફ</button><button class="btn-save" id="modalSave">✅ સેવ</button></div></div></div>`;
}

/* ============================================================
   MAIN RENDER
============================================================ */
let _renderPending = false;
function render(){
  if(_renderPending) return;
  _renderPending = true;
  requestAnimationFrame(()=>{
    _renderPending = false; const app = document.getElementById('app'); if(!app) return;
    if(!centerCode){ document.getElementById("nav").style.display = "none"; document.getElementById("syncStatus").style.display = "none"; app.innerHTML = renderSetupPage(); return; }
    document.querySelectorAll('#nav button').forEach(b=>{ b.classList.toggle('active', Number(b.dataset.tab) === state.tab); });
    
    const curMU = calcMonthUsage(state.calY, state.calM, state.ben); let html="";
    if(state.tab===0)      html=renderInventoryPage(curMU);
    else if(state.tab===1) html=renderCalendarPage();
    else if(state.tab===2) html=renderMonthlyPage(curMU);
    else if(state.tab===3) html=renderReportPage();
    else if(state.tab===4) html=renderBillPage(curMU);
    else if(state.tab===5) html=renderAdminPage();
    app.innerHTML = html + renderModal();
    if(state.tab === 3 && !state.modal) initReportZoom();
  });
}

function openModal(d){ const k=dkf(state.calY,state.calM,d); state.modal={y:state.calY,m:state.calM,d}; state.modalVal=state.ben[k]||""; render(); }
function closeModal(){ state.modal=null; state.modalVal=""; render(); }
function saveModal(){ const v=document.getElementById('modalInput').value.trim(); const k=dkf(state.modal.y,state.modal.m,state.modal.d); if(v===""||Number(v)<=0){ delete state.ben[k]; } else { state.ben[k]=Number(v); } invalidateCache(); saveState(); closeModal(); }
function clearModal(){ delete state.ben[dkf(state.modal.y,state.modal.m,state.modal.d)]; invalidateCache(); saveState(); closeModal(); }
function prevMonth(){ state.calM--; if(state.calM<0){state.calM=11;state.calY--;} render(); }
function nextMonth(){ state.calM++; if(state.calM>11){state.calM=0;state.calY++;} render(); }

function initReportZoom(){
  initZoomSet("zoom", "zoomInner", "zoomPct", 70);
  requestAnimationFrame(()=>{
    const tbl = document.querySelector('#zoomInner table');
    if(tbl){
      const offset = Math.ceil((tbl.querySelector('th.sticky-c1')?.offsetWidth||32) + (tbl.querySelector('th.sticky-c2')?.offsetWidth||52));
      tbl.querySelectorAll('.sticky-c3').forEach(el=>{ el.style.left = offset+'px'; });
    }
  });
}
function initZoomSet(prefix, innerId, pctId, defaultVal){
  const slider = document.getElementById(prefix+"Slider"); if(!slider) return;
  slider.addEventListener('input', () => { const val = slider.value; document.getElementById(innerId).style.zoom = val/100; document.getElementById(pctId).textContent = val+"%"; });
}

/* ============================================================
   EVENT DELEGATION
============================================================ */
document.addEventListener('click', e=>{
  const t=e.target;
  if(t.id==='btnSubmitSetup'){ const val=document.getElementById("centerCodeInput").value.trim(); if(val){ centerCode=val; localStorage.setItem("anganwadi_center_code",centerCode); bootApp(); } return; }
  if(t.id==='adminPwdBtn'){ const inp=document.getElementById("adminPwdInput"); if(inp && inp.value===ADMIN_PASSWORD){ state.adminUnlocked=true; render(); fetchAllCentersCloudData(); } else { alert("❌ ખોર્ટ!"); } return; }
  if(t.id==='btnAdminLock'){ state.adminUnlocked=false; render(); return; }
  if(t.id==='btnRefreshAdminData'){ fetchAllCentersCloudData(); return; }
  if(t.id==='btnLogoutHeader'||t.id==='btnLogout'){ if(confirm("Logout?")){ localStorage.clear(); location.reload(); } return; }
  if(t.matches('#nav button')){ state.tab=Number(t.dataset.tab); render(); return; }
  if(t.id==='prevM'){ prevMonth(); return; }
  if(t.id==='nextM'){ nextMonth(); return; }
  const cell=t.closest('.cal-cell'); if(cell&&cell.dataset.day){ openModal(Number(cell.dataset.day)); return; }
  if(t.id==='modalCancel'){ closeModal(); return; }
  if(t.id==='modalSave'){ saveModal(); return; }
  if(t.id==='modalClear'){ clearModal(); return; }
  if(t.matches('.report-tabs button')){ state.rptTab=t.dataset.rpt; render(); return; }
  if(t.id==='btnPrint'){ window.print(); return; }
});

document.addEventListener('input', e=>{
  const t=e.target;
  if(t.matches('input[data-inv]')){ state.inv[t.dataset.inv][t.dataset.field] = parseFloat(t.value)||0; invalidateCache(); scheduleSave(); }
  if(t.id==='modalInput') state.modalVal=t.value;
});

if(centerCode){ bootApp(); } else { render(); }
</script>

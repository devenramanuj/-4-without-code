<style>
/* ✅ FIX 2: System font stack FIRST — UI shows instantly before Noto loads */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans Gujarati',system-ui,-apple-system,'Segoe UI',sans-serif;
  background:#f0f4f8;color:#1a2535;line-height:1.4;
  /* ✅ FIX 3: font-display hint via CSS */
  font-display:swap
}

/* ✅ FIX 4: Critical above-fold styles inlined, rest loaded lazily */
.container{max-width:1200px;margin:0 auto;padding:10px}
.header{background:linear-gradient(135deg,#0f2442,#1a3c5e);color:#fff;padding:5px 6px;position:sticky;top:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.header h1{font-size:12px;text-align:center;margin-bottom:1px;font-weight:700}
.nav{display:flex;gap:0px;justify-content:center;flex-wrap:wrap;line-height:1}
.nav button{background:transparent;color:#cfd8e3;border:none;padding:2px 4px;font-size:8px;font-family:inherit;cursor:pointer;border-bottom:1px solid transparent;font-weight:600;line-height:1;margin:0;min-height:auto}
.nav button.active{color:#f39c12;border-bottom-color:#f39c12}
.card{background:#fff;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.08);margin-bottom:12px;border:1px solid #d1dce8;overflow:hidden}
.section-head{background:linear-gradient(135deg,#1a3c5e,#2563a8);color:#fff;padding:10px 14px;font-weight:700;font-size:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.section-body{padding:12px}

/* ✅ FIX 5: Skeleton loader for instant visual feedback */
.skeleton{background:linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:8px;height:120px;margin:12px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.inv-card{border:1px solid #d1dce8;border-radius:10px;padding:10px;background:#fafcff}
.inv-title{font-weight:700;font-size:13px;margin-bottom:6px;padding:4px 8px;border-radius:14px;display:inline-block}
.inv-row{display:flex;justify-content:space-between;align-items:center;margin:4px 0;font-size:12px}
.inv-row label{color:#475569;font-weight:600}
.inv-row input{width:75px;padding:4px 6px;border:1px solid #cbd5e1;border-radius:6px;font-family:inherit;text-align:right;font-size:12px}
.inv-stat{font-size:11px;color:#64748b;margin-top:6px;padding-top:6px;border-top:1px dashed #d1dce8}
.inv-stat b{color:#2563a8}
.cal-head{display:flex;justify-content:space-between;align-items:center;padding:8px;gap:6px}
.cal-head button{background:#2563a8;color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700}
.cal-head h3{font-size:15px;font-weight:700;color:#1a3c5e}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:4px;box-sizing:border-box;width:100%}
.cal-day-head{text-align:center;font-weight:700;font-size:11px;padding:5px 1px;background:#1a3c5e;color:#fff;border-radius:4px;box-sizing:border-box;overflow:hidden}
.cal-day-head.sun{background:#cc3d3d}
.cal-cell{aspect-ratio:1;border:1px solid #d1dce8;border-radius:6px;padding:2px;cursor:pointer;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;font-size:11px;transition:all .15s;min-height:44px;position:relative;box-sizing:border-box;overflow:hidden}
.cal-cell:hover{background:#e0f2fe;border-color:#2563a8}
.cal-cell.empty{background:transparent;border:none;cursor:default}
.cal-cell.today{background:#fef3c7;border-color:#f59e0b;border-width:2px}
.cal-cell .d{font-weight:700;font-size:12px;color:#1a3c5e}
.cal-cell.sunday .d{color:#cc3d3d}
.cal-cell .n{font-weight:800;font-size:14px;color:#1b8f57;margin-top:2px}
.cal-cell .n.zero{color:#cbd5e1;font-size:10px}
.cal-totals{display:flex;justify-content:space-around;background:#eef5fb;padding:8px;flex-wrap:wrap;gap:6px;border-top:1px solid #d1dce8}
.cal-totals div{font-size:12px;text-align:center}
.cal-totals b{color:#2563a8;display:block;font-size:14px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:500;padding:14px}
.modal{background:#fff;border-radius:14px;padding:18px;max-width:340px;width:100%;box-shadow:0 10px 30px rgba(0,0,0,.3)}
.modal h3{margin-bottom:10px;color:#1a3c5e;font-size:16px}
.modal p{font-size:13px;color:#475569;margin-bottom:10px}
.modal input{width:100%;padding:10px;border:2px solid #cbd5e1;border-radius:8px;font-family:inherit;font-size:18px;text-align:center;font-weight:700;margin-bottom:12px}
.modal input:focus{outline:none;border-color:#2563a8}
.modal-btns{display:flex;gap:8px}
.modal-btns button{flex:1;padding:10px;border:none;border-radius:8px;font-family:inherit;font-weight:700;cursor:pointer;font-size:14px}
.btn-save{background:#1b8f57;color:#fff}
.btn-cancel{background:#e2e8f0;color:#475569}
.btn-clear{background:#cc3d3d;color:#fff}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{border-collapse:separate;border-spacing:0;width:100%;font-size:11px}
th{background:#1a3c5e;color:#fff;padding:8px 6px;text-align:center;border:1px solid rgba(255,255,255,.15);font-weight:700;font-size:11px;white-space:nowrap;position:sticky;top:0;z-index:2}
td{padding:6px;text-align:center;border:1px solid #d1dce8;background:#fff;white-space:nowrap}
tr:nth-child(even) td{background:#f8fafc}
/* ── Sticky columns: તા. | વ. | સં. ── */
/* c1=તારીખ 32px | c2=વાર fit | c3=સં. 32px */
.sticky-c1{position:sticky;left:0;z-index:3;box-shadow:none;width:32px;min-width:32px;max-width:32px}
.sticky-c2{position:sticky;left:32px;z-index:3;white-space:nowrap;width:auto;padding-left:6px;padding-right:6px}
.sticky-c3{position:sticky;left:calc(32px + var(--c2w, 52px));z-index:3;width:32px;min-width:32px;max-width:32px;box-shadow:2px 0 4px rgba(0,0,0,.08)}
th.sticky-c1,th.sticky-c2,th.sticky-c3{z-index:5;background:#1a3c5e}
td.sticky-c1,td.sticky-c2,td.sticky-c3{background:#fff}
tr:nth-child(even) td.sticky-c1,tr:nth-child(even) td.sticky-c2,tr:nth-child(even) td.sticky-c3{background:#f8fafc}
tr.sun-row td{background:#fff0f0 !important;color:#991b1b}
tr.sun-row td.sticky-c1,tr.sun-row td.sticky-c2,tr.sun-row td.sticky-c3{background:#fff0f0 !important;color:#991b1b;font-weight:700}
.total-row td{background:#fef3c7 !important;font-weight:800;color:#92400e;border-top:2px solid #f59e0b}
.total-row td.sticky-c1,.total-row td.sticky-c2,.total-row td.sticky-c3{background:#fef3c7 !important;color:#92400e}
.report-tabs{display:flex;gap:6px;padding:8px;background:#eef5fb;border-bottom:1px solid #d1dce8}
.report-tabs button{flex:1;padding:8px;border:none;background:#fff;color:#475569;border-radius:6px;font-family:inherit;font-weight:700;cursor:pointer;font-size:13px;border:1px solid #d1dce8}
.report-tabs button.active{background:#2563a8;color:#fff;border-color:#2563a8}
.actions{display:flex;gap:6px;flex-wrap:wrap;padding:10px;background:#f8fafc;border-top:1px solid #d1dce8}
.actions button{padding:7px 12px;border:none;border-radius:6px;font-family:inherit;font-weight:700;cursor:pointer;font-size:12px;color:#fff}
.btn-print{background:#475569}
.btn-share{background:#1b8f57}
.btn-export{background:#7c3aed}
.btn-import{background:#0891b2}
.badge{padding:3px 8px;border-radius:12px;font-size:10px;font-weight:700;display:inline-block}
.footer{text-align:center;padding:12px;color:#64748b;font-size:11px}
.logout-btn{background:rgba(204,61,61,.85);color:#fff;border:none;padding:3px 8px;border-radius:4px;font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .15s}
.logout-btn:hover{background:#cc3d3d}
.header-center-info{font-size:9px;color:#a0b4c8;text-align:center;margin-bottom:2px}

/* ✅ FIX 6: sync status — content-visibility for off-screen perf */
.sync-status{text-align:center;padding:3px 6px;font-size:10px;font-weight:600;color:#1b8f57;background:#e8f5e9;transition:all .3s;cursor:pointer}
.sync-status.syncing{color:#2563a8;background:#dbeafe}
.sync-status.error{color:#cc3d3d;background:#fee2e2}

/* Setup */
.setup-box{max-width:400px;margin:50px auto;padding:20px;background:#fff;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.1);border:1px solid #d1dce8;text-align:center}
.setup-box h2{color:#1a3c5e;margin-bottom:15px;font-size:18px}
.setup-box input{width:100%;padding:10px;font-size:16px;text-align:center;border:2px solid #cbd5e1;border-radius:8px;margin-bottom:15px;font-family:inherit;font-weight:700}
.setup-box button{background:#2563a8;color:#fff;border:none;padding:10px 20px;font-size:14px;font-weight:700;border-radius:8px;cursor:pointer;width:100%;font-family:inherit}
.rule-chip{display:inline-block;background:#eef5fb;border:1px solid #bfd7f5;border-radius:6px;padding:3px 8px;font-size:10px;font-weight:700;color:#1a3c5e;margin:2px}
.admin-gate{display:flex;align-items:center;justify-content:center;padding:40px 16px}
.admin-gate-box{text-align:center;max-width:280px;width:100%}
.admin-gate-box h2{color:#5b21b6;font-size:16px;margin-bottom:6px}
.admin-gate-box p{color:#64748b;font-size:12px;margin-bottom:14px}
.admin-pwd-input{width:100%;padding:10px;border:2px solid #d1dce8;border-radius:8px;font-size:18px;text-align:center;font-family:inherit;letter-spacing:4px;margin-bottom:8px;transition:border-color .2s}
.admin-pwd-input:focus{outline:none;border-color:#7c3aed}
.admin-pwd-btn{width:100%;padding:10px;background:linear-gradient(135deg,#5b21b6,#7c3aed);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer}
.admin-err{color:#cc3d3d;font-size:12px;min-height:16px;margin-bottom:10px}
.log-filter{display:flex;gap:8px;flex-wrap:wrap;padding:10px;background:#f8fafc;border-bottom:1px solid #d1dce8;align-items:center}
.log-filter input,.log-filter select{padding:6px 10px;border:1px solid #d1dce8;border-radius:6px;font-family:inherit;font-size:12px;background:#fff;flex:1;min-width:80px}
.log-filter button{padding:6px 12px;border:none;border-radius:6px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;color:#fff;background:#2563a8;white-space:nowrap}
.log-filter button.btn-refresh{background:#1b8f57}
.log-table-wrap{overflow-x:auto;max-height:480px;overflow-y:auto}
.log-table{width:100%;border-collapse:collapse;font-size:11px}
.log-table th{background:#1a3c5e;color:#fff;padding:8px 6px;text-align:left;position:sticky;top:0;z-index:2;white-space:nowrap}
.log-table td{padding:7px 6px;border-bottom:1px solid #e2e8f0;white-space:nowrap}
.log-table tr:hover td{background:#f0f7ff}
.log-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.log-NEW{background:#dcfce7;color:#166534}
.log-SAVE{background:#dbeafe;color:#1e40af}
.log-LOGIN{background:#fef9c3;color:#713f12}
.log-LOGOUT{background:#fee2e2;color:#991b1b}
.stat-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;padding:10px}
.stat-card{background:#f8fafc;border:1px solid #d1dce8;border-radius:8px;padding:10px;text-align:center}
.stat-card .s-num{font-size:22px;font-weight:800;color:#5b21b6}
.stat-card .s-lbl{font-size:11px;color:#64748b;margin-top:2px}

/* ✅ FIX 7: content-visibility for off-screen tabs — big render boost */
.tab-content{content-visibility:auto;contain-intrinsic-size:0 500px}

/* ── REPORT ZOOM ── */
.zoom-toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f0f7ff;border-bottom:1px solid #d1dce8;flex-wrap:wrap}
.zoom-toolbar label{font-size:12px;font-weight:700;color:#1a3c5e;white-space:nowrap}
.zoom-slider{flex:1;min-width:100px;max-width:220px;accent-color:#2563a8;cursor:pointer;height:4px}
.zoom-pct{font-size:12px;font-weight:800;color:#2563a8;min-width:38px;text-align:right}
.zoom-btn{background:#2563a8;color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:14px;font-weight:700;cursor:pointer;line-height:1;flex-shrink:0}
.zoom-btn:active{background:#1a3c5e}
.zoom-reset{background:#e2e8f0;color:#475569;border:none;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0}
/* outer clip — scrollable container */
.zoomable-outer{overflow:auto;-webkit-overflow-scrolling:touch;width:100%}
/* ✅ CSS zoom (not transform) — sticky position works correctly inside zoom */
.zoomable-inner{display:block;min-width:100%;zoom:1}

@media print{
  .header,.actions,.nav,.report-tabs,.cal-head button,.sync-status{display:none !important}
  body{background:#fff}
  .card{box-shadow:none;border:1px solid #000}
  th{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  tr.sun-row td{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
/* ── Admin tabs ── */
.admin-tabs{display:flex;gap:0;border-bottom:2px solid #d1dce8}
.admin-tab-btn{flex:1;padding:10px;border:none;background:#f8fafc;color:#475569;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px}
.admin-tab-btn.active{background:#fff;color:#5b21b6;border-bottom-color:#5b21b6}
/* ── Consolidation ── */
.con-toolbar{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#f8fafc;border-bottom:1px solid #d1dce8;flex-wrap:wrap}
.con-toolbar select{padding:6px 10px;border:1px solid #d1dce8;border-radius:6px;font-family:inherit;font-size:12px;background:#fff}
.con-toolbar button{padding:7px 14px;border:none;border-radius:6px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;color:#fff;background:#5b21b6}
.con-toolbar button.btn-export-con{background:#1b8f57}
.con-loading{text-align:center;padding:30px;color:#5b21b6;font-size:14px;font-weight:700}
.con-error{text-align:center;padding:20px;color:#cc3d3d;font-size:13px}
.con-table-wrap{overflow:auto;-webkit-overflow-scrolling:touch;width:100%}
.con-table{width:100%;border-collapse:collapse;font-size:11px}
.con-table th{background:#3b0764;color:#fff;padding:8px 6px;text-align:center;white-space:nowrap;position:sticky;top:0;z-index:2;border:1px solid rgba(255,255,255,.15)}
.con-table th.con-c1{position:sticky;left:0;z-index:5;background:#3b0764;min-width:90px;text-align:left}
.con-table td{padding:6px;text-align:center;border:1px solid #e2e8f0;white-space:nowrap}
.con-table td.con-c1{position:sticky;left:0;z-index:3;background:#fff;font-weight:700;text-align:left;min-width:90px;box-shadow:2px 0 4px rgba(0,0,0,.06)}
.con-table tr:nth-child(even) td{background:#f8fafc}
.con-table tr:nth-child(even) td.con-c1{background:#f8fafc}
.con-table tr.con-total td{background:#fef3c7 !important;font-weight:800;color:#92400e;border-top:2px solid #f59e0b}
.con-table tr.con-total td.con-c1{background:#fef3c7 !important;color:#92400e}
.con-table tr.con-avg td{background:#f0fdf4 !important;font-weight:700;color:#166534}
.con-table tr.con-avg td.con-c1{background:#f0fdf4 !important;color:#166534}
@media (max-width:600px){
  .header h1{font-size:11px}
  .nav button{padding:2px 3px;font-size:7px}
  .inv-grid{grid-template-columns:repeat(2,1fr)}
  .cal-cell{min-height:42px;font-size:10px}
  .cal-cell .n{font-size:12px}
  table{font-size:10px}
  th,td{padding:5px 4px}
}

/* ✅ Mobile Touch Optimization - EXCEPT nav buttons */
@media (hover:none) and (pointer:coarse){
  button:not(.nav button), input[type="button"], input[type="submit"]{
    padding: 12px 16px !important;
    font-size: 16px !important;
    min-height: 44px;
    min-width: 44px;
    border-radius: 8px;
  }
  .cal-cell{
    min-height: 48px;
  }
  .modal input{
    padding: 14px !important;
    font-size: 16px !important;
    min-height: 44px;
  }
  /* Prevent zoom on double-tap */
  input, button, select, textarea{
    font-size: 16px;
  }
}

/* Landscape mode optimization */
@media (max-height:600px) and (orientation:landscape){
  .header h1{font-size:14px}
  .nav button{padding:4px 6px;font-size:10px}
  .container{padding:6px}
  .card{margin-bottom:8px}
  .section-head{padding:8px 10px;font-size:12px}
  .section-body{padding:8px}
  table{font-size:9px}
  th,td{padding:3px 2px}
}

/* Prevent accidental selection on touch */
*{
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
}
input, textarea, button, a{
  -webkit-user-select: text;
}
</style>

<!-- ✅ FIX 8: Header renders IMMEDIATELY — no JS needed -->
<div class="header">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
    <h1 style="font-size:16px;margin:0;flex:1;text-align:center">🌾 My Daily Report</h1>
    <button class="logout-btn" id="btnLogoutHeader" style="display:none">🚪 Logout</button>
  </div>
  <div id="centerInfoBar" style="display:none;text-align:center;font-size:11px;color:#a0b4c8;margin-bottom:4px"></div>
  <div class="nav" id="nav" style="display:none;">
    <button data-tab="0" class="active">📦 ઈન્વેન્ટરી</button>
    <button data-tab="1">📅 કેલેન્ડર</button>
    <button data-tab="2">📊 ડેશ</button>
    <button data-tab="3">📋 રિપોર્ટ</button>
    <button data-tab="5">🧾 બિલ</button>
    <button data-tab="4">🛡️ Admin</button>

/* ============================================================
   OFFLINE-FIRST SYNC QUEUE — Network-aware save strategy
============================================================ */
let syncQueue = [];
let isSyncing = false;
let isOnline = navigator.onLine;

// Monitor network status
window.addEventListener('online', () => {
  isOnline = true;
  setStatus("🟢 Network OK — Syncing...", "#1b8f57");
  processSyncQueue();
});

window.addEventListener('offline', () => {
  isOnline = false;
  setStatus("🔴 Offline — Local save માત્ર", "#e67e22");
});

async function saveState(){
  if(!centerCode) return;
  
  // 1️⃣ ALWAYS save to local first (instant)
  const dataToSave = {inv:state.inv, ben:state.ben, timestamp: new Date().toISOString()};
  localStorage.setItem("mdr_offline_" + centerCode, JSON.stringify(dataToSave));
  
  // 2️⃣ If no cloud URL configured
  if(!_hasURL){ 
    setStatus("💾 Local save OK (Cloud config missing)", "#e67e22"); 
    return; 
  }
  
  // 3️⃣ If ONLINE → try cloud save immediately
  if(isOnline){
    await cloudSaveWithRetry(dataToSave);
  } else {
    // 4️⃣ If OFFLINE → queue the save
    addToSyncQueue(dataToSave);
    setStatus("📤 Queued (Network નાહી) — Offline save OK", "#f59e0b");
  }
}

function addToSyncQueue(data){
  syncQueue.push({
    action: 'save',
    data: data,
    centerCode: centerCode,
    timestamp: Date.now(),
    retries: 0
  });
  localStorage.setItem("sync_queue_" + centerCode, JSON.stringify(syncQueue));
}

async function cloudSaveWithRetry(data, retries = 3){
  for(let attempt = 1; attempt <= retries; attempt++){
    try{
      setStatus(`⏳ Cloud save (${attempt}/${retries})...`, "#2563a8");
      const ctrl = new AbortController();
      const tid = setTimeout(()=>ctrl.abort(), 8000);
      
      const res = await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        headers: {"Content-Type": "text/plain"},
        body: JSON.stringify({centerCode, data: {inv: data.inv, ben: data.ben}}),
        signal: ctrl.signal
      });
      clearTimeout(tid);
      
      const result = await res.json();
      if(result.status === "ok"){
        setStatus(`✅ Cloud saved — ${new Date().toLocaleTimeString('gu-IN')}`, "#1b8f57");
        sendLog("SAVE", `ક્લાઉડ સેવ succesful`);
        return true;
      } else {
        throw new Error(result.msg || "Save failed");
      }
    } catch(e){
      console.log(`Attempt ${attempt} failed:`, e.message);
      if(attempt === retries){
        // All retries failed - add to queue
        addToSyncQueue(data);
        setStatus(`📤 Queued for sync (${syncQueue.length} pending)`, "#f59e0b");
        return false;
      }
      // Wait before retry
      await new Promise(r => setTimeout(r, 1000 * attempt));
    }
  }
}

async function processSyncQueue(){
  if(isSyncing || !isOnline || syncQueue.length === 0) return;
  
  isSyncing = true;
  let successCount = 0;
  let failedCount = 0;
  
  for(let i = 0; i < syncQueue.length; i++){
    const item = syncQueue[i];
    if(item.action === 'save'){
      const result = await cloudSaveWithRetry(item.data, 2);
      if(result){
        successCount++;
        syncQueue.splice(i, 1);
        i--;
      } else {
        failedCount++;
      }
      // Delay between requests
      await new Promise(r => setTimeout(r, 500));
    }
  }
  
  // Save updated queue
  if(syncQueue.length > 0){
    localStorage.setItem("sync_queue_" + centerCode, JSON.stringify(syncQueue));
  } else {
    localStorage.removeItem("sync_queue_" + centerCode);
  }
  
  isSyncing = false;
  
  if(successCount > 0){
    setStatus(`✅ ${successCount} synced | ${failedCount} pending`, "#1b8f57");
  }
}

// Load sync queue on boot
function loadSyncQueue(){
  const raw = localStorage.getItem("sync_queue_" + centerCode);

    try{
      syncQueue = JSON.parse(raw);
      if(syncQueue.length > 0 && isOnline){
        setTimeout(processSyncQueue, 1000);
      }
    } catch(_){}
  }
}

async function syncCloud(){
  if(!_hasURL){ setStatus("⚠️ Apps Script URL સેટ નથી — Offline mode","#e67e22"); return; }
  setStatus("⏳ Background sync...","#2563a8");
  try{
    const ctrl = new AbortController();
    const tid  = setTimeout(()=>ctrl.abort(), 12000);
    const res  = await fetch(`${APPS_SCRIPT_URL}?centerCode=${encodeURIComponent(centerCode)}`,{signal:ctrl.signal});
    clearTimeout(tid);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if(data && data.status !== "new_user" && data.status !== "error"){
      if(data.inv) state.inv = data.inv;
      if(data.ben) state.ben = data.ben;
      localStorage.setItem("mdr_offline_" + centerCode, JSON.stringify({inv:state.inv, ben:state.ben}));
      setStatus(`☁️ Synced — ${centerCode}`);
      render();
    } else if(data.status === "new_user"){
      setStatus(`🆕 નવું કેન્દ્ર: ${centerCode}`);
      sendLog("NEW", `નવી આંગણ: ${centerCode}`);
    } else {
      throw new Error(data.msg || "unknown");
    }
  }catch(e){
    const msg = e.name === "AbortError" ? "Timeout (12s)" : e.message;
    setStatus(`⚠️ Offline mode | ${msg}`, "#e67e22");
  }
}

/* ── Consolidation table ── */
function buildConsolidationHTML(){
  const con = state.con;

  const yOpts = [con.selY-1, con.selY, con.selY+1].map(y =>
    "<option value='" + y + "'" + (y===con.selY?" selected":"") + ">" + y + "</option>"
  ).join("");
  const mOpts = MONTHS_FULL.map((m,i) =>
    "<option value='" + i + "'" + (i===con.selM?" selected":"") + ">" + m + "</option>"
  ).join("");

  const toolbar = "<div class='con-toolbar'>"
    + "<select id='conSelY'>" + yOpts + "</select>"
    + "<select id='conSelM'>" + mOpts + "</select>"
    + "<button id='btnFetchCenters'>\uD83D\uDD04 Refresh</button>"
    + "<button class='btn-export-con' id='btnExportCon'>\uD83D\uDCE5 CSV</button>"
    + "<span style='font-size:11px;color:#64748b'>" + con.centers.length + " centers</span>"
    + "</div>";

  if(con.loading) return toolbar
    + "<div class='con-loading'>\u29D1 \u0AA1\u0AC7\u0A9F\u0ABE \u0AB2\u0ACB\u0AA1 \u0AA5\u0A88 \u0AB0\u0AB9\u0ACD\u0AAF\u0ACB \u0A9B\u0AC7...</div>";

  if(con.error) return toolbar
    + "<div class='con-error'>\u274C " + con.error
    + "<br><button onclick='fetchAllCenters()' style='margin-top:10px;padding:6px 14px;background:#5b21b6;color:#fff;border:none;border-radius:6px;font-family:inherit;font-weight:700;cursor:pointer'>\u0AAB\u0AB0\u0AC0 try \u0A95\u0AB0\u0ACB</button></div>";

  if(!con.centers.length) return toolbar
    + "<div class='con-loading' style='color:#64748b'>\uD83D\uDCED \u0A95\u0ACB\u0A88 center data \u0AA8\u0AA5\u0AC0"
    + "<br><button onclick='fetchAllCenters()' style='margin-top:10px;padding:6px 14px;background:#5b21b6;color:#fff;border:none;border-radius:6px;font-family:inherit;font-weight:700;cursor:pointer'>Load Centers</button></div>";

  // ── rows: mu + closing balance per item ──
  const rows = con.centers.map(c => {
    const mu  = calcMonthUsage(con.selY, con.selM, c.ben || {});
    const inv = c.inv || {};
    // closing balance per item (kg)
    const closing = {};
    ITEMS.forEach(it => {
      const iv      = inv[it.id] || {o:0, r:0};
      const opening = (iv.o || 0) + (iv.r || 0);
      closing[it.id] = opening - (mu[it.id] || 0) / 1000;
    });
    return { code: c.centerCode, mu, closing };
  }).sort((a,b) => b.mu.totalN - a.mu.totalN);

  // ── grand totals ──
  const grand = { totalN:0, days:0 };
  ITEMS.forEach(it => {
    grand[it.id]          = 0;
    grand[it.id+"M"]      = 0;
    grand[it.id+"A"]      = 0;
    grand[it.id+"closing"]= 0;
  });
  rows.forEach(r => {
    grand.totalN += r.mu.totalN;
    grand.days   += r.mu.days;
    ITEMS.forEach(it => {
      grand[it.id]           += r.mu[it.id]     || 0;
      grand[it.id+"M"]       += r.mu[it.id+"M"] || 0;
      grand[it.id+"A"]       += r.mu[it.id+"A"] || 0;
      grand[it.id+"closing"] += r.closing[it.id]|| 0;
    });
  });

  // ── table headers: colspan 4 (સ.વ. | બ.વ. | કુલ | બ.સિ.) ──
  const invHeads = ITEMS.map(it =>
    "<th colspan='4' style='background:" + it.color + "'>" + it.emoji + " " + it.name + "</th>"
  ).join("");
  const subHeads = ITEMS.map(() =>
    "<th>\u0AB8.\u0AB5.(g)</th><th>\u0AAC.\u0AB5.(g)</th><th>\u0A95\u0AC1\u0AB3(g)</th>"
    + "<th style='color:#86efac'>\u0AAC.\u0AB8\u0ABF.(kg)</th>"
  ).join("");

  // ── data rows ──
  const dataRows = rows.map((r,i) => {
    const cols = ITEMS.map(it =>
      "<td>" + (r.mu[it.id+"M"]||0) + "</td>"
      + "<td>" + (r.mu[it.id+"A"]||0) + "</td>"
      + "<td style='font-weight:700;color:" + (r.mu[it.id] ? "#e67e22" : "#cbd5e1") + "'>"
        + (r.mu[it.id]||0) + "</td>"
      + "<td style='font-weight:700;color:#1b8f57'>" + fmt(r.closing[it.id],3) + "</td>"
    ).join("");
    return "<tr>"
      + "<td class='con-c1'>"
      + "<span style='background:#ede9fe;color:#5b21b6;border-radius:10px;padding:1px 6px;font-size:10px;margin-right:4px'>" + (i+1) + "</span>"
      + r.code + "</td>"
      + "<td style='font-weight:700;color:#2563a8'>" + r.mu.days + "</td>"
      + "<td style='font-weight:700;color:#1b8f57'>" + r.mu.totalN + "</td>"
      + "<td style='color:#64748b'>" + (r.mu.days ? fmt(r.mu.totalN/r.mu.days,1) : "\u2014") + "</td>"
      + cols + "</tr>";
  }).join("");

  // ── grand total row ──
  const n = rows.length || 1;
  const grandCols = ITEMS.map(it =>
    "<td>" + grand[it.id+"M"] + "</td>"
    + "<td>" + grand[it.id+"A"] + "</td>"
    + "<td style='font-weight:800'>" + grand[it.id] + "</td>"
    + "<td style='font-weight:800;color:#1b8f57'>" + fmt(grand[it.id+"closing"],3) + "</td>"
  ).join("");
  const totalRow = "<tr class='con-total'>"
    + "<td class='con-c1'>\uD83D\uDD22 Grand Total (" + rows.length + " \u0A95\u0AC7\u0AA8\u0ACD\u0AA6\u0ACD\u0AB0)</td>"
    + "<td>" + grand.days + "</td><td>" + grand.totalN + "</td><td>\u2014</td>"
    + grandCols + "</tr>";

  // ── average row ──
  const avgCols = ITEMS.map(it =>
    "<td>" + fmt(grand[it.id+"M"]/n,0) + "</td>"
    + "<td>" + fmt(grand[it.id+"A"]/n,0) + "</td>"
    + "<td>" + fmt(grand[it.id]/n,0) + "</td>"
    + "<td style='color:#1b8f57'>" + fmt(grand[it.id+"closing"]/n,3) + "</td>"
  ).join("");
  const avgRow = "<tr class='con-avg'>"
    + "<td class='con-c1'>\uD83D\uDCCA \u0AB8\u0AB0\u0AC7\u0AB0\u0ABE\u0AB6 / center</td>"
    + "<td>" + fmt(grand.days/n,1) + "</td><td>" + fmt(grand.totalN/n,1) + "</td><td>\u2014</td>"
    + avgCols + "</tr>";

  return toolbar
    + "<div class='con-table-wrap' style='max-height:520px'>"
    + "<table class='con-table'><thead>"
    + "<tr><th class='con-c1' rowspan='2'>\uD83C\uDFE2 \u0A95\u0AC7\u0AA8\u0ACD\u0AA6\u0ACD\u0AB0</th>"
    + "<th rowspan='2'>\u0AA6\u0ABF.</th><th rowspan='2'>\u0A95\u0AC1\u0AB3 \u0AB2.</th>"
    + "<th rowspan='2'>\u0AB8./\u0AA6\u0ABF.</th>"
    + invHeads + "</tr>"
    + "<tr>" + subHeads + "</tr>"
    + "</thead>"
    + "<tbody>" + dataRows + totalRow + avgRow + "</tbody>"
    + "</table></div>";
}
function exportConsolidationCSV(){
  const con = state.con;

  let csv = "કેન્દ્ર,દિ.,કુળ લ.,સ./દિ.";
  ITEMS.forEach(it => {
    csv += "," + it.name + " સ.વ.(g)," + it.name + " બ.વ.(g)," + it.name + " કુળ(g)," + it.name + " બ.સિ.(kg)";
  });
  csv += "\n";
  con.centers.forEach(c => {
    const mu  = calcMonthUsage(con.selY, con.selM, c.ben || {});
    const inv = c.inv || {};
    csv += c.centerCode + "," + mu.days + "," + mu.totalN + "," + (mu.days ? fmt(mu.totalN/mu.days,1) : "0");
    ITEMS.forEach(it => {
      const iv      = inv[it.id] || {o:0, r:0};
      const opening = (iv.o||0) + (iv.r||0);
      const closing = opening - (mu[it.id]||0)/1000;
      csv += "," + (mu[it.id+"M"]||0) + "," + (mu[it.id+"A"]||0) + "," + (mu[it.id]||0) + "," + fmt(closing,3);
    });
    csv += "\n";
  });
  const blob = new Blob(["﻿" + csv], {type:"text/csv;charset=utf-8"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href     = url;
  a.download = "consolidation-" + MONTHS_FULL[con.selM] + "-" + con.selY + ".csv";
  a.click();
  URL.revokeObjectURL(url);
}


/* ============================================================
   USAGE RULES
============================================================ */
function calcUsage(dow, n){
  n = Number(n) || 0;
  const u = {};
  ITEMS.forEach(it=>{ u[it.id]=0; u[it.id+"M"]=0; u[it.id+"A"]=0; u[it.id+"nM"]=0; u[it.id+"nA"]=0; });
  if(!n || dow === 0) return u;

  // Morning
  u.telM = 5*n; u.telnM = n;
  if(dow===1||dow===3||dow===4||dow===5||dow===6){ u.ghauM=30*n; u.ghaunM=n; }
  if(dow===2){ u.chokhaM=30*n; u.chokhanM=n; }

  // Afternoon
  u.telA = 8*n; u.telnA = n;
  if(dow===1||dow===2||dow===5){ u.ghauA=50*n; u.ghaunA=n; }
  if(dow===3||dow===4||dow===6){ u.chokhaA=50*n; u.chokhanA=n; }
  if(dow===2||dow===4||dow===5){ u.chanaA=20*n; u.chananA=n; }
  if(dow===1||dow===3){ u.dalA=20*n; u.dalnA=n; }
  if(dow===6){ u.chanadalA=20*n; u.chanadalnA=n; }

  ITEMS.forEach(it=>{ u[it.id] = u[it.id+"M"] + u[it.id+"A"]; });
  return u;
}
const morU = (id,u) => u[id+"M"] || 0;
const aftU = (id,u) => u[id+"A"] || 0;

function dayHint(d){
  const h=["🔴 રવિ — રજા (સ+બ બંધ)","સ:ઘઉ30+તે5 | બ:ઘઉ50+દા20+તે8","સ:ચો30+તે5 | બ:ઘઉ50+ચ20+તે8","સ:ઘઉ30+તે5 | બ:ચો50+દા20+તે8","સ:ઘઉ30+તે5 | બ:ચો50+ચ20+તે8","સ:ઘઉ30+તે5 | બ:ઘઉ50+ચ20+તે8","સ:ઘઉ30+તે5 | બ:ચો50+ચદ20+તે8"];
  return h[d] || "";
}
const dkf = (y,m,d) => `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

/* ✅ FIX 12: calcMonthUsage cached — avoid recompute on every render */
let _muCache = null, _muCacheKey = "";
function calcMonthUsage(y,m,ben){
  const key = `${y}-${m}-${JSON.stringify(ben)}`;
  if(_muCache && _muCacheKey === key) return _muCache;
  const total = {totalN:0,days:0};
  ITEMS.forEach(it=>{ total[it.id]=0;total[it.id+"M"]=0;total[it.id+"A"]=0;total[it.id+"nM"]=0;total[it.id+"nA"]=0; });
  const dim = new Date(y,m+1,0).getDate();
  for(let d=1;d<=dim;d++){
    const n = Number(ben[dkf(y,m,d)] || 0);
    if(!n) continue;
    const u = calcUsage(new Date(y,m,d).getDay(), n);
    ITEMS.forEach(it=>{ total[it.id]+=u[it.id];total[it.id+"M"]+=u[it.id+"M"];total[it.id+"A"]+=u[it.id+"A"];total[it.id+"nM"]+=u[it.id+"nM"];total[it.id+"nA"]+=u[it.id+"nA"]; });
    total.totalN += n; total.days++;
  }
  _muCache = total; _muCacheKey = key;
  return total;
}
function invalidateCache(){ _muCache = null; _muCacheKey = ""; }

/* ============================================================
   MAIN RENDER  — ✅ FIX 14: requestAnimationFrame = no jank
============================================================ */
let _renderPending = false;
function render(){
  if(_renderPending) return;
  _renderPending = true;
  requestAnimationFrame(()=>{
    _renderPending = false;
    const app = document.getElementById('app');
    if(!app) return;
    if(!centerCode){
      document.getElementById("nav").style.display = "none";
      document.getElementById("syncStatus").style.display = "none";
      app.innerHTML = renderSetupPage();
      return;
    }
    document.querySelectorAll('#nav button').forEach(b=>{
      b.classList.toggle('active', Number(b.dataset.tab) === state.tab);
    });
    const curMU = calcMonthUsage(state.calY, state.calM, state.ben);
    let html="";
    if(state.tab===0)      html=renderInventoryPage(curMU);
    else if(state.tab===1) html=renderCalendarPage();
    else if(state.tab===2) html=renderDashboardPage(curMU);
    else if(state.tab===3) html=renderReportPage();
    else if(state.tab===5) html=renderBillPage();
    else if(state.tab===4) html=renderAdminPage();
    html += renderModal();
    app.innerHTML = html;
    if(state.modal){
      const inp=document.getElementById('modalInput');
      if(inp){ inp.focus(); inp.select(); }
    }
    // Report zoom init — after DOM is ready
    if(state.tab === 3 && !state.modal) initReportZoom();
  });
}

  invalidateCache(); saveState(); closeModal();
}

function generateReportPDF(){
  if(typeof pdfMake === 'undefined'){
    alert('❌ PDF loading... try again');
    return;
  }
  
  const today = new Date();
  const todayK = dkf(today.getFullYear(), today.getMonth(), today.getDate());
  const todayN = Number(state.ben[todayK] || 0);
  const todayU = calcUsage(today.getDay(), todayN);
  const curMU = calcMonthUsage(state.calY, state.calM, state.ben);
  
  // Daily report
  const dailyTable = ITEMS.map(it => {
    const iv = state.inv[it.id], opening = iv.o + iv.r;
    const mor = morU(it.id, todayU), aft = aftU(it.id, todayU), tot = todayU[it.id] || 0;
    return [it.name, todayN.toString(), fmt(opening,2), (mor||'—'), (aft||'—'), (tot||'—'), fmt(opening - tot/1000, 2)];
  });
  
  // Monthly summary
  const monthlyTable = ITEMS.map(it => {
    const iv = state.inv[it.id], opening = iv.o + iv.r;

function importBackup(file){
  const r=new FileReader();
  r.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data.inv) state.inv=data.inv;
      if(data.ben) state.ben=data.ben;
      invalidateCache(); saveState(); render();
      alert("✅ Restore!");
    }catch(_){ alert("❌ ખોટી file"); }
  };
  r.readAsText(file);
}

/* ============================================================
   ZOOM HELPERS
   — applyZoom(innerId, pctId, val) : sets CSS transform + label
   — initZoom(wrapperId)            : attach after render
============================================================ */
function applyZoom(innerId, pctId, val){
  val = Math.max(25, Math.min(200, val));
  const inner = document.getElementById(innerId);
  const pct   = document.getElementById(pctId);
  // ✅ CSS zoom — sticky position works correctly (transform breaks sticky)
  if(inner) inner.style.zoom = (val/100);
  if(pct)   pct.textContent  = val + "%";
  return val;
}

// Wire a zoom toolbar set (slider + +/- buttons + reset)
function initZoomSet(prefix, innerId, pctId, defaultVal){
  const slider  = document.getElementById(prefix+"Slider");
  const btnOut  = document.getElementById(prefix+"Out");
  const btnIn   = document.getElementById(prefix+"In");
  const btnRst  = document.getElementById(prefix+"Reset");
  if(!slider) return;
  let cur = defaultVal || parseInt(slider.value) || 100;

  const sync = v => {
    cur = applyZoom(innerId, pctId, v);
    slider.value = cur;
  };

  slider.addEventListener('input', () => sync(parseInt(slider.value)));
  btnOut && btnOut.addEventListener('click', () => sync(cur - 10));
  btnIn  && btnIn.addEventListener('click',  () => sync(cur + 10));
  btnRst && btnRst.addEventListener('click', () => sync(defaultVal || 100));

  // Touch pinch-to-zoom on the outer container
  const outer = document.getElementById(innerId)?.parentElement;
  if(outer){
    let startDist = 0, startZoom = cur;
    outer.addEventListener('touchstart', e=>{
      if(e.touches.length===2){
        startDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
        startZoom = cur;
      }
    },{passive:true});
    outer.addEventListener('touchmove', e=>{
      if(e.touches.length===2){
        const dist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
        const ratio = dist / (startDist || 1);
        sync(Math.round(startZoom * ratio));
      }
    },{passive:true});
  }

  sync(cur); // apply default
}

// Called after render whenever report tab is shown
function initReportZoom(){
  if(state.rptTab === 'daily'){
    initZoomSet("zoom", "zoomInner", "zoomPct", 100);
  } else {
    // sticky-c3 left = c1.width + c2.width (measured after paint)
    requestAnimationFrame(()=>{
      const tbl = document.querySelector('#zoomInner table');
      if(tbl){
        const c1 = tbl.querySelector('th.sticky-c1');
        const c2 = tbl.querySelector('th.sticky-c2');
        const offset = Math.ceil((c1?c1.offsetWidth:32) + (c2?c2.offsetWidth:52));
        tbl.querySelectorAll('.sticky-c3').forEach(el=>{ el.style.left = offset+'px'; });
      }
    });
    initZoomSet("zoom",  "zoomInner",  "zoomPct",  70);
    initZoomSet("zoom2", "zoom2Inner", "zoom2Pct", 100);
  }
}

/* ============================================================
   EVENT DELEGATION  — single listener, fast
============================================================ */
document.addEventListener('click', e=>{
  const t=e.target;
  // Setup
  if(t.id==='btnSubmitSetup'){
    const val=document.getElementById("centerCodeInput").value.trim();
    if(!val){alert("⚠️ Code!");return;}
    centerCode=val;
    localStorage.setItem("anganwadi_center_code",centerCode);
    sendLog('LOGIN',`Login — ${centerCode}`);
    bootApp();
    return;
  }
  // Admin
  if(t.id==='adminPwdBtn'){
    const inp=document.getElementById("adminPwdInput");
    if(inp&&inp.value===ADMIN_PASSWORD){ state.adminUnlocked=true; fetchLogs(); }
    else { const err=document.getElementById("adminPwdErr"); if(err) err.textContent="❌ ખોટો!"; if(inp){inp.value="";inp.focus();} }
    return;
  }
  if(t.id==='btnAdminLock'){ state.adminUnlocked=false; render(); return; }
  if(t.id==='btnRefreshLogs'){ fetchLogs(); return; }
  // Admin tabs
  if(t.id==='adminTabLogs'){ state.adminTab="logs"; render(); return; }
  if(t.id==='adminTabCon'){
    state.adminTab="consolidation"; render();
    if(!state.con.centers.length && !state.con.loading) fetchAllCenters();
    return;
  }
  // Consolidation
  if(t.id==='btnFetchCenters'){ fetchAllCenters(); return; }
  if(t.id==='btnExportCon'){ exportConsolidationCSV(); return; }
  if(t.id==='btnApplyFilter'){
    state.logFilter.center=document.getElementById("filterCenter")?.value||"";
    state.logFilter.action=document.getElementById("filterAction")?.value||"";
    state.logFilter.date=document.getElementById("filterDate")?.value||"";
    render(); return;
  }
  // Logout
  if(t.id==='btnLogoutHeader'||t.id==='btnLogout'){
    if(confirm("Logout?")){
      sendLog('LOGOUT',`Logout — ${centerCode}`);
      localStorage.removeItem("anganwadi_center_code");
      centerCode="";
      state.inv=JSON.parse(JSON.stringify(DEFAULT_INV));
      state.ben={};
      invalidateCache();
      const bar=document.getElementById("centerInfoBar"), btn=document.getElementById("btnLogoutHeader");
      if(bar){bar.style.display="none";bar.innerHTML="";}
      if(btn) btn.style.display="none";
      document.getElementById("nav").style.display="none";
      render();
    } return;
  }
  // Nav tabs
  if(t.matches('#nav button')){ state.tab=Number(t.dataset.tab); render(); return; }
  // Month nav
  if(t.id==='prevM'){ prevMonth(); return; }
  if(t.id==='nextM'){ nextMonth(); return; }
  // Calendar cell
  const cell=t.closest('.cal-cell');
  if(cell&&cell.dataset.day){ openModal(Number(cell.dataset.day)); return; }
  // Modal
  if(t.id==='modalCancel'){ closeModal(); return; }
  if(t.id==='modalSave'){ saveModal(); return; }
  if(t.id==='modalClear'){ clearModal(); return; }
  if(t.matches('.report-tabs button')){ state.rptTab=t.dataset.rpt; render(); return; }
  if(t.id==='btnReportPDF'){ generateReportPDF(); return; }
  if(t.id==='btnMonthlyPDF'){ generateMonthlyPDF(); return; }
  if(t.id==='btnPrint'){ window.print(); return; }
  if(t.id==='btnShare'){ shareReport(); return; }
  if(t.id==='btnShareM'){ shareMonthly(); return; }
  if(t.id==='btnPDF'){ generateMonthlyPDF(); return; }
  if(t.id==='btnExport'){ exportBackup(); return; }
  if(t.id==='btnImport'){ document.getElementById('fileImport').click(); return; }
});

document.addEventListener('input', e=>{
  const t=e.target;
  if(t.matches('input[data-inv]')){
    state.inv[t.dataset.inv][t.dataset.field] = parseFloat(t.value)||0;
    invalidateCache();
    scheduleSave(); // ✅ Debounced — no rapid save on every key
  }
  if(t.id==='modalInput') state.modalVal=t.value;
  if(t.id==='fileImport'&&t.files&&t.files[0]){ importBackup(t.files[0]); t.value=""; }
});

document.addEventListener('change', e=>{
  if(e.target.matches('input[data-inv]')) render();
  // Consolidation month/year selector
  if(e.target.id==='conSelY'){ state.con.selY=parseInt(e.target.value); render(); }
  if(e.target.id==='conSelM'){ state.con.selM=parseInt(e.target.value); render(); }
});

document.addEventListener('keydown', e=>{
  if(!state.modal) return;
  if(e.key==='Enter'){e.preventDefault();saveModal();}
  if(e.key==='Escape') closeModal();
});

/* ============================================================
   BOOT  — ✅ instant local first, cloud in background
============================================================ */
if(centerCode){ bootApp(); } else { render(); }

// ✅ Periodic sync check every 30 seconds (જો queue હોય તો)
setInterval(() => {
  if(centerCode && isOnline && syncQueue.length > 0){
    processSyncQueue();
  }
  // Check network status
  if(navigator.onLine !== isOnline){
    isOnline = navigator.onLine;
    if(isOnline){
      setStatus("🟢 Network OK — Syncing...", "#1b8f57");
      processSyncQueue();
    } else {
      setStatus("🔴 Offline — Local save માત્ર", "#e67e22");
    }
  }
}, 30000);

/* ============================================================
   SERVICE WORKER — OPTIONAL (offline caching)
   Note: If SW fails, offline-first sync queue still works via localStorage
============================================================ */
// SW is optional - core offline functionality works with localStorage
if('serviceWorker' in navigator && navigator.onLine !== undefined){
  window.addEventListener('load', ()=>{
    // Disabled in some environments, but not critical
    // Offline-first queue already handles sync via localStorage
  });
}

// Mobile install prompt - optional feature
if(window.beforeinstallprompt){
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const msg = '📲 Home screen પર add કરો!';
    setStatus(msg, '#2563a8');
    setTimeout(() => {
      if(centerCode && deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choiceResult) => {
          if(choiceResult.outcome === 'accepted') {
            setStatus('✅ App installed!', '#1b8f57');
          }
          deferredPrompt = null;
        });
      }
    }, 3000);
  });
}
